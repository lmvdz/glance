# Scope the root test runner to tests/ so `bun test` does not descend into
# webapp/ (a separate Vite+React package with its own vitest suite, run via
# `cd webapp && bun run test`).
[test]
root = "tests"
# Hermetic baseline: strip inherited PLANE_* creds (so no test hits the live Plane API) and
# OMP_SQUAD_* runtime toggles (so the daemon's self-audit flags can't flip default-path tests).
# See tests/preload.ts and tests/setup.ts.
preload = ["./tests/preload.ts", "./tests/setup.ts"]

# Scope the root test runner to tests/ so `bun test` does not descend into
# webapp/ (a separate Vite+React package with its own bun test suite, run via
# `cd webapp && bun run test`).
[test]
root = "tests"
# Hermetic baseline: strip inherited PLANE_* creds and OBSERVE flags so tests
# never hit the live Plane API or pick up the daemon's self-audit toggles.
preload = "./tests/preload.ts"

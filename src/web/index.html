function mdEsc(s) { return String(s).replace(/[&<>]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[c])); }

function mdInline(s) {
  const codes = [];
  s = s.replace(/`([^`]+)`/g, (_, c) => { codes.push(c); return "\u0000" + (codes.length - 1) + "\u0000"; });
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, (_, a, u) => `<img class="md-img" src="${u.replace(/"/g, "%22")}" alt="${a}" loading="lazy">`);
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, t, u) => `<a href="${u.replace(/"/g, "%22")}" target="_blank" rel="noopener">${t}</a>`);
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>").replace(/__([^_]+)__/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*\w])\*([^*\n]+)\*/g, "$1<em>$2</em>").replace(/(^|[^_\w])_([^_\n]+)_/g, "$1<em>$2</em>");
  s = s.replace(/~~([^~]+)~~/g, "<del>$1</del>");
  s = s.replace(/\u0000(\d+)\u0000/g, (_, n) => `<code>${codes[+n]}</code>`);
  return s;
}

// Best-effort, dependency-free syntax highlighting: comments, strings, numbers, and a
// generic keyword set across common languages. Strings are matched before line comments,
// so a `//` inside a string isn't mistaken for a comment.
function highlightCode(code, lang) {
  const hash = /^(py|python|bash|sh|shell|zsh|ruby|rb|yaml|yml|toml|ini|makefile|dockerfile|r|perl|pl|nim|elixir|ex)$/i.test(lang || "");
  const kw = new Set(["function","fn","def","return","if","else","elif","for","while","do","switch","case","break","continue","const","let","var","new","class","struct","enum","interface","type","import","export","from","as","default","public","private","protected","static","async","await","yield","try","catch","finally","throw","raise","with","in","of","is","not","and","or","pub","impl","trait","mut","use","mod","match","where","func","package","val","when","extends","implements","super","this","self","void","null","nil","none","true","false","undefined","lambda","print","echo","local","then","fi","done","esac","require","module","go","defer","chan","map","string","int","bool","float","double","char","namespace"]);
  const re = /(\/\/[^\n]*|#[^\n]*)|(\/\*[\s\S]*?\*\/)|("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`)|(\b\d[\d_]*(?:\.\d+)?(?:[eE][+-]?\d+)?\b)|([A-Za-z_$][\w$]*)/g;
  let out = "", last = 0, m;
  while ((m = re.exec(code))) {
    out += mdEsc(code.slice(last, m.index));
    last = re.lastIndex;
    if (m[1]) out += (m[1][0] === "#" && !hash) ? mdEsc(m[1]) : `<span class="tok-c">${mdEsc(m[1])}</span>`;
    else if (m[2]) out += `<span class="tok-c">${mdEsc(m[2])}</span>`;
    else if (m[3]) out += `<span class="tok-s">${mdEsc(m[3])}</span>`;
    else if (m[4]) out += `<span class="tok-n">${mdEsc(m[4])}</span>`;
    else if (m[5]) out += kw.has(m[5]) ? `<span class="tok-k">${mdEsc(m[5])}</span>` : mdEsc(m[5]);
    else out += mdEsc(m[0]);
  }
  out += mdEsc(code.slice(last));
  return out;
}

function renderItemText(t) {
  const cb = t.match(/^\[([ xX])\]\s+(.*)$/);
  if (cb) return `<span class="md-task">${cb[1] === " " ? "☐" : "☑"}</span> ${mdInline(mdEsc(cb[2]))}`;
  return mdInline(mdEsc(t));
}

// Build nested <ul>/<ol> from flat {indent, ordered, text} items by indentation depth.
function buildList(items, pos) {
  const indent = items[pos].indent, ordered = items[pos].ordered;
  let html = ordered ? "<ol>" : "<ul>", i = pos;
  while (i < items.length && items[i].indent >= indent) {
    if (items[i].indent > indent) { i++; continue; }
    let inner = renderItemText(items[i].text);
    let j = i + 1;
    if (j < items.length && items[j].indent > indent) { const sub = buildList(items, j); inner += sub.html; j = sub.next; }
    html += `<li>${inner}</li>`;
    i = j;
  }
  html += ordered ? "</ol>" : "</ul>";
  return { html, next: i };
}

// Compact CommonMark-ish renderer: fenced + inline code, headings, lists, quotes, rules, emphasis, links.
function renderMarkdown(src) {
  const lines = String(src ?? "").split("\n");
  let html = "", i = 0;
  while (i < lines.length) {
    const line = lines[i];
    const fence = line.match(/^\s*(```+|~~~+)(.*)$/);
    if (fence) {
      const mark = fence[1][0].repeat(3); const lang = fence[2].trim().split(/\s+/)[0]; const buf = []; i++;
      while (i < lines.length && !lines[i].trimStart().startsWith(mark)) { buf.push(lines[i]); i++; }
      i++;
      html += `<pre><code>${highlightCode(buf.join("\n"), lang)}</code></pre>`;
      continue;
    }
    if (/^\s*(---+|\*\*\*+|___+)\s*$/.test(line)) { html += "<hr>"; i++; continue; }
    const h = line.match(/^\s*(#{1,6})\s+(.*)$/);
    if (h) { const l = h[1].length; html += `<h${l}>${mdInline(mdEsc(h[2]))}</h${l}>`; i++; continue; }
    if (/^\s*>\s?/.test(line)) {
      const buf = []; while (i < lines.length && /^\s*>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/, "")); i++; }
      html += `<blockquote>${renderMarkdown(buf.join("\n"))}</blockquote>`; continue;
    }
    if (/^\s*([-*+]|\d+[.)])\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*([-*+]|\d+[.)])\s+/.test(lines[i])) {
        const mm = lines[i].match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
        items.push({ indent: mm[1].replace(/\t/g, "  ").length, ordered: /\d/.test(mm[2]), text: mm[3] });
        i++;
      }
      html += buildList(items, 0).html;
      continue;
    }
    if (line.includes("|") && i + 1 < lines.length && /^[\s|:-]+$/.test(lines[i + 1]) && lines[i + 1].includes("-") && lines[i + 1].includes("|")) {
      const cells = (r) => r.replace(/^\s*\|/, "").replace(/\|\s*$/, "").split("|").map(c => c.trim());
      const headers = cells(line);
      const aligns = cells(lines[i + 1]).map(c => (c.startsWith(":") && c.endsWith(":")) ? "center" : c.endsWith(":") ? "right" : c.startsWith(":") ? "left" : "");
      i += 2;
      const rows = [];
      while (i < lines.length && lines[i].includes("|") && !/^\s*$/.test(lines[i])) { rows.push(cells(lines[i])); i++; }
      const cell = (c, a, tag) => `<${tag}${a ? ` style="text-align:${a}"` : ""}>${mdInline(mdEsc(c ?? ""))}</${tag}>`;
      html += `<table><thead><tr>${headers.map((c, j) => cell(c, aligns[j], "th")).join("")}</tr></thead><tbody>${rows.map(r => `<tr>${headers.map((_, j) => cell(r[j], aligns[j], "td")).join("")}</tr>`).join("")}</tbody></table>`;
      continue;
    }
    if (/^\s*$/.test(line)) { i++; continue; }
    const buf = [line]; i++;
    while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^\s*(```+|~~~+|#{1,6}\s|>\s?)/.test(lines[i]) && !/^\s*([-*+]|\d+[.)])\s+/.test(lines[i]) && !/^\s*(---+|\*\*\*+|___+)\s*$/.test(lines[i]) && !(lines[i].includes("|") && i + 1 < lines.length && /^[\s|:-]+$/.test(lines[i + 1]) && lines[i + 1].includes("-") && lines[i + 1].includes("|"))) { buf.push(lines[i]); i++; }
    html += `<p>${mdInline(mdEsc(buf.join("\n")))}</p>`;
  }
  return html;
}

function appendTranscript(e) {
  const t = $("#transcript"); if (!t) return; const ph = t.querySelector(".te-empty"); if (ph) ph.remove();
  const div = document.createElement("div"); div.className = "te " + e.kind;
  const rich = e.kind === "assistant" || e.kind === "user" || e.kind === "thinking" || e.kind === "system";
  const body = rich ? `<div class="md">${renderMarkdown(e.text)}</div>` : `<span class="body">${esc(e.text)}</span>`;
  div.innerHTML = `<span class="who">${e.kind}</span>${body}`;
  const atBottom = t.scrollHeight - t.scrollTop - t.clientHeight < 60; t.appendChild(div); if (atBottom) t.scrollTop = t.scrollHeight;
}

function toast(text, level) { const el = document.createElement("div"); el.className = "toast " + (level||"info"); el.textContent = text; $("#log").appendChild(el); setTimeout(()=>el.remove(), 5000); }

// add modal
const dlg = $("#addDlg");
$("#addBtn").onclick = () => { const repo = $("#addForm").repo; if (selProject) repo.value = selProject; dlg.showModal(); };
$("#addCancel").onclick = () => dlg.close();
$("#addForm").onsubmit = (e) => {
  const f = new FormData(e.target); const options = { repo: f.get("repo").trim() };
  for (const k of ["name","task"]) { const v=(f.get(k)||"").trim(); if (v) options[k]=v; }
  options.approvalMode = f.get("approvalMode"); options.thinking = f.get("thinking");
  send({ type:"create", options }); e.target.reset();
};

fetch("/api/info").then(r=>r.json()).then(i=>{ spawnCwd = i.cwd || "."; }).catch(()=>{});

// Upgrade: pull latest + re-exec the daemon (agents survive via detached hosts).
async function refreshUpgrade() {
  try {
    const g = await (await fetch("/api/upgrade/status")).json();
    const btn = document.querySelector("#upgradeBtn");
    btn.textContent = g.behind > 0 ? `⤴ Upgrade (${g.behind})` : "⤴ Upgrade";
    btn.title = g.behind > 0 ? `${g.behind} commit(s) behind ${g.upstream||"upstream"} — pull + restart` : "Restart the daemon to load new code (agents survive)";
  } catch {}
}
document.querySelector("#upgradeBtn").onclick = async () => {
  if (!(await confirmModal({ title: "Upgrade daemon?", body: "Pull latest + restart. Agents keep running; the dashboard will reconnect." }))) return;
  toast("upgrading — pulling + restarting…", "info");
  try {
    const res = await (await fetch("/api/upgrade", { method:"POST", headers:{"content-type":"application/json"}, body:"{}" })).json();
    toast(res.pull?.detail ? `pull: ${res.pull.detail}` : "restarting…", res.pull?.ok===false ? "warn" : "info");
  } catch { toast("restarting…", "info"); }
};
refreshUpgrade(); setInterval(refreshUpgrade, 30000);
const mainEl = document.querySelector("main");
if (localStorage.getItem("squad.navCollapsed") === "1") mainEl.classList.add("nav-collapsed");
$("#navToggle").onclick = () => { const c = mainEl.classList.toggle("nav-collapsed"); localStorage.setItem("squad.navCollapsed", c ? "1" : "0"); };
const muteBtn = $("#muteBtn");
const syncMute = () => { if (muteBtn) muteBtn.textContent = muted ? "🔕" : "🔔"; };
const reqNotifyPerm = () => { try { if (typeof Notification !== "undefined" && Notification.permission === "default") Notification.requestPermission(); } catch {} };
syncMute();
if (muteBtn) muteBtn.onclick = () => { muted = !muted; localStorage.setItem("squad.mute", muted ? "1" : "0"); syncMute(); reqNotifyPerm(); };
window.addEventListener("pointerdown", reqNotifyPerm, { once: true });
window.addEventListener("focus", () => updateBadge(waitingAgents().length));
connect();
</script>

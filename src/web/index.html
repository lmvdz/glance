<meta name="apple-mobile-web-app-title" content="omp-squad" />
<script>
/* pre-paint theme: apply the stored theme before first paint (no flash);
   with nothing stored, CSS @media (prefers-color-scheme) decides. */
(function(){try{
  var t=localStorage.getItem("squad.theme");
  if(t==="light"||t==="dark")document.documentElement.dataset.theme=t;
  var eff=t||(matchMedia("(prefers-color-scheme: light)").matches?"light":"dark");
  var m=document.querySelector('meta[name="theme-color"]');
  if(m)m.content=eff==="light"?"#f6f7f9":"#0c0e12";
}catch(e){}})();
</script>
<style>
  /* ──────────────────────────────────────────────────────────────────────────
     DESIGN TOKENS — institutional mission-control system.
     Scales (type/space/radius/motion) are theme-agnostic and live in :root.

    /* typography */
    --font-sans: ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

    /* motion */
    --dur-fast:.12s; --dur-base:.2s; --ease:cubic-bezier(.2,.7,.2,1);

      --success:#15724b; --success-subtle:#e1f4ea;
      --warning:#80600a; --warning-subtle:#faedca;
      --attention:#bd3d09; --attention-subtle:#fcebe1;
      --danger:#bf3128;  --danger-subtle:#fde8e5;
      --neutral:#636d79; --neutral-subtle:#ececef;
      --info:var(--accent); --info-subtle:var(--accent-subtle);
      --ring:#2563eb; --overlay:rgba(16,24,40,.32);
      --shadow-1:0 1px 2px rgba(16,24,40,.06);

function isStalled(a, now) { return a.status === "working" && now - a.lastActivity > STALL_MS; }
function ctxColor(p) { return p == null ? "var(--mut)" : p > 0.9 ? "var(--err)" : p > 0.7 ? "var(--work)" : "var(--mut)"; }
function fmtDur(ms) { if (ms == null) return ""; const s = ms / 1000; return s < 60 ? `${s.toFixed(1)}s` : s < 3600 ? `${Math.round(s / 60)}m` : `${(s / 3600).toFixed(1)}h`; }
function fmtCost(n) { return n == null ? "" : `$${n.toFixed(4)}`; }
function receiptSpan(r) { if (!r) return ""; const parts = [`🔧 ${r.toolCalls}`]; if (r.costUsd != null) parts.push(fmtCost(r.costUsd)); if (r.durationMs != null) parts.push(fmtDur(r.durationMs)); return ` · <span title="latest run: tool calls · cost · duration">${parts.join(" · ")}</span>`; }
// One shared timer ticks working spinners + relative-time read-outs in place (no re-render).
setInterval(() => {
  spinFrame = (spinFrame + 1) % SPIN.length;
  for (const el of document.querySelectorAll(".spin")) el.textContent = SPIN[spinFrame];
  for (const el of document.querySelectorAll(".agotime")) { const ts = +el.dataset.ts; if (ts) el.textContent = ago(ts) + " ago"; }
}, 120);

let reconnects = 0, opened = false;
function setConn(up) {
  $("#conn").classList.toggle("up", up);
  $("#connText").textContent = up ? "live" : "reconnecting…";
  const off = $("#offline"); if (off) off.hidden = up;
}
function firstPaint(msg) { if (routed) return; const b = $("#body"); if (b) b.innerHTML = `<div class="nodetail">${esc(msg)}</div>`; }
function connect() {
  ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws?token=${encodeURIComponent(TOKEN())}`);
  ws.onopen = () => {
    reconnects = 0; opened = true; setConn(true);
    if (!routed) { routed = true; applyRoute(); }
    else if (view === "agent" && selAgent) { transcripts.delete(selAgent); const t = $("#transcript"); if (t) t.innerHTML = ""; send({ type:"subscribe", id:selAgent }); }
  };
  ws.onmessage = (e) => { let d; try { d = JSON.parse(e.data); } catch { return; } handle(d); };
  ws.onerror = () => {};
  ws.onclose = () => {
    setConn(false);
    if (!opened) firstPaint("Can't reach the daemon — retrying…");
    if (++reconnects === 3) fetch("/api/auth/check").catch(() => {});
    const delay = Math.min(20000, 500 * 2 ** Math.min(reconnects, 5)) + Math.random() * 400;
    setTimeout(connect, delay);
  };
}
function send(cmd) { if (ws && ws.readyState === 1) { ws.send(JSON.stringify(cmd)); return true; } toast("disconnected — not sent", "error"); return false; }

// Slash-command / skill completion: when the token at the cursor starts with "/",
// show a filtered menu over the agent's available commands. Returns { handleKey }
// so the host's keydown handler can defer nav/accept to the menu when it's open.
function attachCompletion(input, getItems) {
  let menu = document.getElementById("cmplMenu");
  if (!menu) { menu = document.createElement("div"); menu.id = "cmplMenu"; menu.className = "cmpl"; document.body.appendChild(menu); }
  let items = [], sel = 0, open = false;
  const tokenAt = () => {
    const v = input.value, pos = input.selectionStart ?? v.length;
    const m = v.slice(0, pos).match(/(^|\s)(\/[^\s]*)$/);
    return m ? { start: pos - m[2].length, query: m[2].slice(1).toLowerCase(), end: pos } : null;
  };
  const close = () => { open = false; menu.classList.remove("open"); };
  const position = () => {
    const r = input.getBoundingClientRect();
    menu.style.left = r.left + "px";
    menu.style.width = Math.min(560, Math.max(340, r.width)) + "px";
    if (r.top > window.innerHeight / 2) { menu.style.bottom = (window.innerHeight - r.top + 6) + "px"; menu.style.top = "auto"; }
    else { menu.style.top = (r.bottom + 6) + "px"; menu.style.bottom = "auto"; }
  };
  const render = () => {
    menu.innerHTML = items.length
      ? items.map((c, i) => `<div class="ci ${i===sel?'sel':''}" data-i="${i}"><div class="top"><span class="nm">/${esc(c.name)}</span>${c.hint?`<span class="hint">${esc(c.hint)}</span>`:''}${c.source?`<span class="src">${esc(c.source)}</span>`:''}</div>${c.description?`<div class="desc">${esc(c.description)}</div>`:''}</div>`).join("")
      : `<div class="none">no matching commands</div>`;
    for (const el of menu.querySelectorAll(".ci")) el.onmousedown = (e) => { e.preventDefault(); accept(items[+el.dataset.i]); };
  };
  const refresh = () => {
    const tok = tokenAt();
    const all = getItems() || [];
    if (!tok || !all.length) return close();
    const q = tok.query;
    items = fuzzyRank(all, q, c => c.name);
    sel = 0; open = true; menu.classList.add("open"); position(); render();
  };
  const accept = (c) => {
    const tok = tokenAt(); if (!c || !tok) return;
    const insert = "/" + c.name + " ";
    input.value = input.value.slice(0, tok.start) + insert + input.value.slice(tok.end);
    input.selectionStart = input.selectionEnd = tok.start + insert.length;
    close(); input.focus(); input.dispatchEvent(new Event("input"));
  };
  input.addEventListener("input", refresh);
  input.addEventListener("blur", () => setTimeout(close, 120));
  return {
    handleKey(e) {
      if (!open) return false;
      if (!items.length) { if (e.key === "Escape") { close(); e.preventDefault(); return true; } return false; }
      if (e.key === "ArrowDown") { sel = (sel + 1) % items.length; render(); e.preventDefault(); return true; }
      if (e.key === "ArrowUp") { sel = (sel - 1 + items.length) % items.length; render(); e.preventDefault(); return true; }
      if (e.key === "Enter" || e.key === "Tab") { accept(items[sel]); e.preventDefault(); return true; }
      if (e.key === "Escape") { close(); e.preventDefault(); return true; }
      return false;
    },
  };
}

function handle(ev) {
  switch (ev.type) {
    case "roster": agents.clear(); for (const a of ev.agents) agents.set(a.id, a); seedStatus(); checkUiVersion(ev.version); refreshShell(); break;
    case "agent": { const prev = prevStatus.get(ev.agent.id); agents.set(ev.agent.id, ev.agent); signalTransition(prev, ev.agent); prevStatus.set(ev.agent.id, ev.agent.status); refreshShell(); break; }
    case "commands": commandsByAgent.set(ev.id, ev.commands); break;
    case "features-changed": if (view === "board" || view === "feature") loadFeatures(); break;
    case "removed": agents.delete(ev.id); prevStatus.delete(ev.id); transcripts.delete(ev.id); lastNotify.delete(ev.id); commandsByAgent.delete(ev.id); composerDraft.delete(ev.id); if (selAgent === ev.id) { selAgent = null; view = "project"; } renderAll(); break;
    case "transcript": { const a = transcripts.get(ev.id) ?? []; a.push(ev.entry); transcripts.set(ev.id, a); if (ev.id === selAgent && view === "agent") appendTranscript(ev.entry); break; }
    case "log": toast(ev.text, ev.level); break;
    default: console.warn("unknown event type:", ev && ev.type); break;
  }
}

// Live-reload: the first roster after page load pins the UI version; a LATER reconnect
// reporting a different version means the daemon upgraded the served assets — refresh.
let uiVersion = null;
function checkUiVersion(version) {
  if (!version) return;
  if (uiVersion === null) { uiVersion = version; return; }
  if (version !== uiVersion) { toast("Updated — reloading…", "info"); setTimeout(() => location.reload(), 400); }
}

// Seed status from a full roster snapshot WITHOUT notifying — guards the initial load
// and every reconnect replay from firing a notification storm.
function seedStatus() { prevStatus.clear(); for (const a of agents.values()) prevStatus.set(a.id, a.status); }

function signalTransition(prev, a) {
  if (prev === undefined || prev === a.status) return;   // brand-new agent or no change
  if (a.status === "input") { const p = (a.pending || [])[0]; announce(`${a.name} needs your input`); notify(a.id, `⛔ ${a.name} needs you`, p ? p.title : "waiting for input", true); }
  else if (a.status === "error") { announce(`${a.name} errored`); notify(a.id, `⚠ ${a.name} errored`, a.error || "agent error", true); }
  else if (a.status === "idle" && prev === "working") notify(a.id, `✓ ${a.name} finished`, a.activity || "turn complete", false);
}

// Out-of-band signal: desktop Notification (lazy permission) + optional beep. Title/favicon
// badge is driven separately by updateBadge() in renderCounts.
function notify(id, title, body, sound) {
  const now = Date.now();
  if (now - (lastNotify.get(id) || 0) < 2000) return;   // per-agent throttle
  lastNotify.set(id, now);
  if (sound && !muted) beep();
  if (typeof Notification !== "undefined" && Notification.permission === "granted") {
    try { const n = new Notification(title, { body, tag: id }); n.onclick = () => { window.focus(); openAgent(id); }; } catch {}
  }
}

function beep() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext; if (!Ctx) return;
    const ctx = beep.ctx || (beep.ctx = new Ctx());
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine"; o.frequency.value = 660; g.gain.value = 0.05;
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.15);
  } catch {}
}

// Title + favicon badge reflect the count of requests waiting on the operator.
function updateBadge(n) { document.title = n > 0 ? `(${n}) ${baseTitle}` : baseTitle; setFavicon(n); }
function setFavicon(n) {
  let link = document.getElementById("favicon");
  if (!link) { link = document.createElement("link"); link.id = "favicon"; link.rel = "icon"; document.head.appendChild(link); }
  const c = document.createElement("canvas"); c.width = c.height = 32; const x = c.getContext("2d");
  x.fillStyle = "#14181d"; x.fillRect(0, 0, 32, 32);
  x.fillStyle = "#6ea8fe"; x.font = "bold 22px sans-serif"; x.textAlign = "center"; x.textBaseline = "middle"; x.fillText("◆", 16, 17);
  if (n > 0) { x.fillStyle = "#e0654f"; x.beginPath(); x.arc(23, 9, 8, 0, 2 * Math.PI); x.fill(); x.fillStyle = "#fff"; x.font = "bold 12px sans-serif"; x.fillText(n > 9 ? "9+" : String(n), 23, 10); }
  link.href = c.toDataURL("image/png");
}

// ── derive projects from the live roster ────────────────────────────────────
function projects() {
  const byRepo = new Map();
  for (const a of agents.values()) {
    let p = byRepo.get(a.repo);
    if (!p) { p = { id: a.repo, name: a.repo.split("/").filter(Boolean).pop() || a.repo, repo: a.repo, agents: [], counts: {}, pending: 0, last: 0 }; byRepo.set(a.repo, p); }
    p.agents.push(a); p.counts[a.status] = (p.counts[a.status]||0)+1; p.pending += a.pending.length; p.last = Math.max(p.last, a.lastActivity);
  }
  return [...byRepo.values()].sort((x,y) => y.last - x.last);
}

function renderAll() { renderSidebar(); renderCrumb(); renderBody(); renderCounts(); pushRoute(); }

// URL routing: the hash mirrors the view so refresh / deep-link / back-forward all work.
let routed = false;
function pushRoute() {
  const h = view === "race" ? "#/race"
    : view === "queue" ? "#/queue"
    : view === "board" ? "#/board"
    : view === "feature" && selFeature ? `#/feature/${encodeURIComponent(selFeature)}`
    : view === "agent" && selAgent ? `#/agent/${encodeURIComponent(selAgent)}`
    : selProject ? `#/project/${encodeURIComponent(selProject)}` : "#/";
  if (location.hash !== h) history.pushState(null, "", h);
}
function safeDecode(s) { try { return decodeURIComponent(s); } catch { return s; } }
function applyRoute() {
  if (location.hash === "#/board") { view = "board"; selFeature = null; renderAll(); loadFeatures(); return; }
  if (location.hash === "#/queue") { view = "queue"; selAgent = null; renderAll(); return; }
  if (location.hash === "#/race") { view = "race"; selAgent = null; renderAll(); return; }
  const mf = location.hash.match(/^#\/feature\/(.+)$/);
  if (mf) { selFeature = safeDecode(mf[1]); view = "feature"; renderAll(); loadFeatures(); return; }
  const m = location.hash.match(/^#\/(agent|project)\/(.+)$/);
  if (m && m[1] === "agent") { openAgent(safeDecode(m[2])); return; }
  if (m && m[1] === "project") { selProject = safeDecode(m[2]); selAgent = null; view = "project"; renderAll(); return; }
  selProject = null; selAgent = null; view = "project"; renderAll();
}
window.addEventListener("hashchange", applyRoute);
window.addEventListener("popstate", applyRoute);

function renderCounts() {
  const all = [...agents.values()]; const need = waitingAgents().length;
  $("#counts").textContent = `${projects().length} projects · ${all.length} agents`;
  updateBadge(need);
  renderNav(); maybeMobileLand();
}

// Unified left nav — the single navigation surface (Overview / Features / Queue),
// above the Projects list. Header keeps only global actions (⌘K, New agent, Upgrade).
function renderNav() {
  const nav = $("#navMain"); if (!nav) return;
  const need = waitingAgents().length;
  const rows = [
    { id:"home",  ico:"⌂",  lbl:"Overview", sel: view === "project" && !selProject, on: () => { selProject = null; selAgent = null; view = "project"; renderAll(); } },
    { id:"board", ico:"▦",  lbl:"Features", sel: view === "board" || view === "feature", on: openBoard },
    { id:"queue", ico:"⛔", lbl:"Queue",    sel: view === "queue", ct: need, attn: need > 0, on: openQueue },
    { id:"race",  ico:"⇶",  lbl:"Race",     sel: view === "race", on: openRace },
  ];
  nav.innerHTML = rows.map(r => `<div class="navrow${r.sel?" sel":""}${r.attn?" attn":""}" data-id="${r.id}" role="button" tabindex="0" aria-label="${r.lbl}" title="${r.lbl}"><span class="ico">${r.ico}</span><span class="lbl">${r.lbl}</span>${r.ct?`<span class="ct">${r.ct}</span>`:""}</div>`).join("");
  for (const r of rows) { const el = nav.querySelector(`[data-id="${r.id}"]`); if (el) { const act = () => { r.on(); closeDrawer(); }; el.onclick = act; el.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); act(); } }; } }
}

function dots(counts) { return `<span class="dots">${STATUSES.filter(s=>counts[s]).map(s=>`<span class="dseg" title="${counts[s]} ${s}"><span class="d ${s}"></span>${counts[s]}</span>`).join("")}</span>`; }

function renderSidebar() {
  const ps = projects(); const el = $("#projects");
  if (!ps.length) { el.innerHTML = `<div class="empty"><strong>No projects yet</strong>Spawn an agent and its repo appears here.<button class="primary empty-act" id="emptyAdd">+ New agent</button></div>`; const b = el.querySelector("#emptyAdd"); if (b) b.onclick = () => $("#addBtn").click(); return; }
  el.innerHTML = "";
  for (const p of ps) {
    const div = document.createElement("div");
    div.className = "proj" + (p.id === selProject ? " sel" : "") + (p.pending ? " needs" : "");
    div.innerHTML = `<div class="pinitial">${esc((p.name[0]||"?").toUpperCase())}</div><div class="pn">${esc(p.name)}</div>
      <div class="pmeta">${dots(p.counts)} <span>${p.agents.length} agent${p.agents.length===1?"":"s"}</span>${p.pending?`<span style="color:var(--input)">⛔ ${p.pending}</span>`:""}</div>`;
    clickable(div, () => { selProject = p.id; selAgent = null; view = "project"; renderAll(); closeDrawer(); }, `Open project ${p.name}`);
    el.appendChild(div);
  }
}

function renderCrumb() {
  const c = $("#crumb"); const p = projects().find(x => x.id === selProject);
  if (!p) { c.innerHTML = `<span class="cur">Overview</span>`; return; }
  const a = selAgent ? agents.get(selAgent) : null;
  c.innerHTML = `<span class="seg" id="cbProj">Projects</span> <span style="color:var(--dim)">/</span> `
    + (a ? `<span class="seg" id="cbP">${esc(p.name)}</span> <span style="color:var(--dim)">/</span> <span class="cur">${esc(a.name)}</span>`
         : `<span class="cur">${esc(p.name)}</span>`);
  const cbProj = document.getElementById("cbProj"); if (cbProj) cbProj.onclick = () => { selProject = null; selAgent = null; view = "project"; renderAll(); };
  const cbP = document.getElementById("cbP"); if (cbP) cbP.onclick = () => { selAgent = null; view = "project"; renderAll(); };
}

function renderBody() {
  const body = $("#body");
  if (view === "board") return renderBoard(body);
  if (view === "queue") return renderQueue(body);
  if (view === "race") return renderRace(body);
  if (view === "feature") return renderFeature(body, features.get(selFeature));
  const p = projects().find(x => x.id === selProject);
  if (!p) return renderHome(body);
  if (view === "agent" && selAgent && agents.has(selAgent)) return renderAgent(body, agents.get(selAgent));
  renderProject(body, p);
}

// ── Attention queue ─────────────────────────────────────────────────────────
// Fold every pending request across the whole roster into one supervise-by-exception
// surface, oldest-waiting first. Pure read over data already broadcast (pending[]).
function waitingAgents() {
  const reqs = [];
  for (const a of agents.values()) for (const p of (a.pending || [])) reqs.push({ agent: a, req: p });
  return reqs.sort((x, y) => x.agent.lastActivity - y.agent.lastActivity);
}
function erroredAgents() { return [...agents.values()].filter(a => a.status === "error").sort((x, y) => x.lastActivity - y.lastActivity); }
function openQueue() { view = "queue"; selAgent = null; renderAll(); }

// Wire one rendered preq() node to the answer channel. Shared by the queue + renderPending.
function wireReq(node, agentId, p) {
  if (p.kind === "confirm") { node.querySelector(".yes").onclick = () => send({ type:"answer", id:agentId, requestId:p.id, value:"yes" }); node.querySelector(".no").onclick = () => send({ type:"answer", id:agentId, requestId:p.id, value:"no" }); }
  else if (p.kind === "select") node.querySelectorAll("button[data-opt]").forEach(b => b.onclick = () => send({ type:"answer", id:agentId, requestId:p.id, value:b.dataset.opt }));
  else { const i = node.querySelector("input"); node.querySelector(".submit").onclick = () => send({ type:"answer", id:agentId, requestId:p.id, value:i.value }); }
}

function renderQueue(body) {
  const reqs = waitingAgents(); const errs = erroredAgents();
  body.innerHTML = `<div class="pv">
    <div class="bvh"><div><h2>Attention queue</h2><div class="sub">${reqs.length} request${reqs.length===1?"":"s"} waiting${errs.length?` · ${errs.length} errored`:""} — answer in place, oldest first</div></div><button id="qHome" class="navbtn" title="Back">← Back</button></div>
    <div class="section"><h3>Needs your input</h3><div class="inner" id="qreqs"></div></div>
    ${errs.length?`<div class="section"><h3>Errored agents</h3><div class="inner" id="qerrs"></div></div>`:""}</div>`;
  $("#qHome").onclick = () => { view = "project"; renderAll(); };
  const box = $("#qreqs");
  if (!reqs.length) box.innerHTML = `<span style="color:var(--dim)">Nothing waiting — all caught up.</span>`;
  else {
    box.innerHTML = reqs.map(({ agent:a, req:p }) => `<div style="margin-bottom:14px">
      <div style="margin-bottom:4px"><span class="badge b-${a.status}">${esc(a.status)}</span> <strong>${esc(a.name)}</strong> <span style="color:var(--dim)">${esc(a.repo.split("/").filter(Boolean).pop()||a.repo)}</span> <a class="qopen" data-aid="${esc(a.id)}" style="color:var(--accent);cursor:pointer">open agent →</a></div>
      ${preq(p)}</div>`).join("");
    for (const { agent:a, req:p } of reqs) { const node = box.querySelector(`[data-req="${CSS.escape(p.id)}"]`); if (node) wireReq(node, a.id, p); }
    for (const el of box.querySelectorAll(".qopen")) clickable(el, () => openAgent(el.dataset.aid), "open agent");
  }
  const eb = $("#qerrs");
  if (eb) { eb.innerHTML = errs.map(a => `<div class="subnode" data-aid="${esc(a.id)}" style="cursor:pointer"><span class="badge b-error">error</span> ${esc(a.name)} <span style="color:var(--dim)">${esc(a.error||"")}</span></div>`).join(""); for (const el of eb.querySelectorAll("[data-aid]")) clickable(el, () => openAgent(el.dataset.aid), "open agent"); }
}

// ── Race board (OMPSQ-8) ─────────────────────────────────────────────────────
// One lane per agent; workflow phases are a segmented track filled from todo.done/total,
// the current cell labelled todo.active. Pure client-side fold over fields already
// broadcast (no server route, no poll, no new dep). Fan-out branches indent under parent.
function openRace() { view = "race"; selAgent = null; renderAll(); }
function raceTrack(a) {
  const total = Math.max(1, a.todo.total);
  const done = Math.min(a.todo.done, total);
  const settled = a.status === "idle" || a.status === "error" || a.status === "stopped";
  let cells = "";
  for (let i = 0; i < total; i++) {
    const fill = i < done || (settled && i === total - 1);   // settled runs land in the last cell
    const cur = !settled && i === done && done < total;       // current phase = first unfinished cell
    cells += `<span class="rc ${a.status}${fill ? " f" : ""}${cur ? " c" : ""}"></span>`;
  }
  const label = a.todo.active || (settled ? a.status : "");
  return `<div class="rtrack">${cells}</div><span class="rlabel">${esc(label)} <span style="color:var(--dim)">${done}/${total}</span></span>`;
}
function renderRace(body) {
  const all = [...agents.values()];
  const live = new Set(all.map(a => a.id));
  const byStatus = (x, y) => STATUSES.indexOf(x.status) - STATUSES.indexOf(y.status);
  const roots = all.filter(a => !a.parentId || !live.has(a.parentId)).sort(byStatus);
  const ordered = [];
  for (const r of roots) { ordered.push([r, false]); for (const ch of all.filter(a => a.parentId === r.id).sort(byStatus)) ordered.push([ch, true]); }
  body.innerHTML = `<div class="pv">
    <div class="bvh"><div><h2>Race board</h2><div class="sub">${all.length} agent${all.length===1?"":"s"} · per-agent pipeline position — who's where, who's stalled</div></div><button id="rHome" class="navbtn" title="Back">← Back</button></div>
    <div class="section"><div class="inner" id="rlanes" style="display:flex;flex-direction:column;gap:8px"></div></div></div>`;
  $("#rHome").onclick = () => { view = "project"; renderAll(); };
  const box = $("#rlanes");
  if (!ordered.length) { box.innerHTML = `<span style="color:var(--dim)">No agents yet.</span>`; return; }
  const now = Date.now();
  box.innerHTML = ordered.map(([a, child]) => {
    const spin = a.status === "working" ? `<span class="spin" style="color:var(--work)">${SPIN[spinFrame]}</span>` : "";
    const stall = isStalled(a, now) ? `<span class="pill bad" title="working but no activity for a while">⏳ idle ${ago(a.lastActivity)}</span>` : "";
    const head = `<div class="rhead"><span class="badge b-${a.status}">${esc(a.status)}</span>${spin}${child?`<span class="branchmark">↳ branch</span>`:""}<span class="nm">${esc(a.name)}</span>${a.issue?`<span class="issue">${esc(a.issue.identifier||"")}</span>`:""}</div>`;
    const mid = a.todo ? raceTrack(a) : `<span class="rlabel" style="flex:1">${esc(a.activity || "—")}</span>`;
    return `<div class="rlane${child?" child":""}" data-aid="${esc(a.id)}">${head}${mid}${stall}<span class="rmeta agotime" data-ts="${a.lastActivity}">${ago(a.lastActivity)} ago</span></div>`;
  }).join("");
  for (const el of box.querySelectorAll("[data-aid]")) clickable(el, () => openAgent(el.dataset.aid), `open ${agents.get(el.dataset.aid)?.name || "agent"}`);
}

// ── Feature board ─────────────────────────────────────────────────────────
const FSTAGES = ["planned", "issues-created", "in-progress", "review", "diverged", "landed", "done"];
const FSTAGE_LABEL = { "planned": "Planned", "issues-created": "Issues filed", "in-progress": "In progress", "review": "Review · needs land", "diverged": "Diverged", "landed": "Landed", "done": "Done" };
let featTimer = null;
function scheduleFeatures() { if (featTimer) return; featTimer = setTimeout(() => { featTimer = null; loadFeatures(); }, 4000); }
let featuresError = "";   // last /api/features failure, surfaced on the board when it would otherwise be blank
async function loadFeatures() {
  try { const r = await fetch("/api/features"); if (r.ok) { const list = await r.json(); features.clear(); for (const f of list) features.set(f.id, f); featuresError = ""; } else featuresError = `couldn't load features (${r.status})`; } catch { featuresError = "couldn't reach the daemon for features"; }
  if (view === "board" || view === "feature") renderBody();
}
function openBoard() { view = "board"; selFeature = null; renderAll(); loadFeatures(); }
function openFeature(id) { selFeature = id; view = "feature"; renderAll(); }
function featNeedsLand(f) { return f.unlandedFiles > 0 || (f.worktrees || []).some(w => w.readiness === "ahead" || w.readiness === "uncommitted"); }
// Land-proof badge text/tooltips, keyed by FeatureWorktreeStatus.proof.state (src/proof.ts).
const PROOF_LABEL = { fresh:"✓ fresh", stale:"stale", failed:"✗ failed", none:"no proof" };
const PROOF_TITLE = { fresh:"acceptance passed against the current HEAD — clear to land", stale:"passed, but HEAD moved since — re-verify before landing", failed:"acceptance command failed — fix and re-verify", none:"no proof recorded — Verify before landing" };
// A landable branch (ahead/uncommitted) that isn't fresh-green is gated by proofGate on the server.
function proofGatesLand(f) { return (f.worktrees||[]).some(w => (w.readiness === "ahead" || w.readiness === "uncommitted") && (!w.proof || w.proof.state !== "fresh")); }

function renderBoard(body) {
  const fs = [...features.values()];
  body.innerHTML = `<div class="pv">
    <div class="bvh"><div><h2>Features</h2><div class="sub">${fs.length} feature${fs.length===1?"":"s"} · in-flight work and what needs landing</div></div><div style="display:flex;gap:6px"><button id="featAuto" class="primary" title="Type a goal — spawn a research → plan → file → implement workflow, tracked here as it moves">⚡ New (auto)</button><button id="featNew" class="navbtn">+ Feature</button><button id="featRefresh" class="navbtn" title="Refresh">↻</button></div></div>
    <div class="board" id="board"></div></div>`;
  const board = $("#board");
  if (!fs.length && featuresError) { board.innerHTML = `<div class="nodetail" style="height:auto;padding:30px;color:var(--err)">${esc(featuresError)} · <span id="featRetry" style="text-decoration:underline;cursor:pointer">retry</span></div>`; const rt = $("#featRetry"); if (rt) clickable(rt, () => loadFeatures(), "retry loading features"); }
  else if (!fs.length) { board.innerHTML = `<div class="nodetail" style="height:auto;padding:30px">No features yet — spawn an agent, or add a plans/&lt;name&gt;/ dir.</div>`; }
  else {
    const lanes = FSTAGES.filter(s => fs.some(f => f.stage === s) || s === "in-progress" || s === "review");
    board.innerHTML = lanes.map(s => {
      const inLane = fs.filter(f => f.stage === s);
      const cards = inLane.map(f => {
        const nl = featNeedsLand(f);
        return `<div class="fcard${f.divergent?" div":""}${f.blocked?" needs":""}" data-fid="${esc(f.id)}">
          <div class="r1"><span class="nm">${esc(f.title)}</span></div>
          <div class="meta">${esc(f.repo.split("/").filter(Boolean).pop()||f.repo)}${f.planDir?` · ${esc(f.planDir)}`:""}</div>
          <div class="pills">${dots(f.statusCounts||{})}
            ${nl?`<span class="pill attn" title="not in your main checkout yet — Land to test">⊟ ${f.unlandedFiles||"unlanded"}</span>`:""}
            ${f.divergent?`<span class="pill bad">⚠ diverged</span>`:""}
            ${f.blocked?`<span class="pill bad">⛔ input</span>`:""}
            ${f.issueIdentifiers&&f.issueIdentifiers.length?`<span class="pill">${f.issueIdentifiers.length} issue${f.issueIdentifiers.length>1?"s":""}</span>`:""}</div></div>`;
      }).join("") || `<div class="lane-empty">—</div>`;
      return `<div class="lane"><div class="lane-h">${FSTAGE_LABEL[s]||s} <span class="lane-n">${inLane.length}</span></div><div class="lane-body">${cards}</div></div>`;
    }).join("");
  }
  for (const el of board.querySelectorAll("[data-fid]")) el.onclick = () => openFeature(el.dataset.fid);
  const rf = $("#featRefresh"); if (rf) rf.onclick = loadFeatures;
  const nf = $("#featNew"); if (nf) nf.onclick = newFeature;
  const na = $("#featAuto"); if (na) na.onclick = newAutoFeature;
}

function renderFeature(body, f) {
  if (!f) { body.innerHTML = `<div class="nodetail">Loading feature…</div>`; return; }
  const landable = (f.worktrees||[]).some(w => w.readiness === "ahead" || w.readiness === "uncommitted");
  const proofGated = landable && proofGatesLand(f);
  body.innerHTML = `<div class="pv">
    <div class="bvh"><div><h2>${esc(f.title)}</h2><div class="sub">${esc(f.repo)}${f.planDir?` · ${esc(f.planDir)}`:""} · <span class="badge b-stage">${esc(f.stage)}</span>${f.workflowStage?` · <span class="badge b-stage" title="live workflow node">⚙ ${esc(f.workflowStage)}${f.workflowProgress?` ${f.workflowProgress.done}/${f.workflowProgress.total}`:""}</span>`:""}${f.persisted?"":` · <span style="color:var(--dim)">derived</span>`}</div></div>
      <div style="display:flex;gap:6px;align-items:center">${f.persisted&&landable?`<button id="featLandAll" class="primary" title="Merge all landable branches into main (ff-first, stops on diverged)">⤳ Land all</button>${proofGated?`<button id="featForceLand" title="Skip the proof gate and land every landable branch now">⚡ Force land</button>`:""}`:""}${!f.persisted&&f.planDir?`<button id="featAdopt" class="primary" title="Adopt this plan as a managed feature (then assign agents + Land)">＋ Adopt as feature</button>`:""}<button id="featBack" class="navbtn" title="Back to board">← Board</button></div></div>
    <div class="section"><h3>Worktrees · Land</h3><div class="inner tree" id="featland"></div></div>
    <div class="section"><h3>Proof${f.persisted?` <button id="featVerify" class="sm" title="Run the feature's acceptance command in each member worktree and record a land proof">✓ Verify</button>`:""}</h3><div class="inner tree" id="featproof"></div></div>
    <div class="section"><h3>Agents</h3><div class="inner" id="featagents"></div>${f.persisted?`<div class="inner"><div class="spawnrow"><input id="fspawnInput" placeholder="Describe a task — spawn an agent on this feature (Enter)" autocomplete="off" /><button id="fspawnBtn" class="sm primary">+ Agent</button></div></div><div class="inner" id="featassign"></div>`:""}</div>
    <div class="section"><h3>Plane tickets</h3><div class="inner" id="featplane"><span style="color:var(--dim)">loading…</span></div></div>
    <div class="section" id="featgatewrap" style="display:none"><h3>Needs your input</h3><div class="inner" id="featgate"></div></div>
    ${f.planDir?`<div class="section"><h3>Pipeline · concerns</h3><div class="inner tree" id="featpipe"><span style="color:var(--dim)">loading…</span></div></div>`:""}</div>`;
  $("#featBack").onclick = openBoard;
  if (f.persisted && landable) { const la = $("#featLandAll"); if (la) la.onclick = () => landAll(f.id, la); }
  const lt = $("#featland");
  if (!f.worktrees || !f.worktrees.length) lt.innerHTML = `<span style="color:var(--dim)">no worktrees</span>`;
  else {
    lt.innerHTML = f.worktrees.map(w => {
      const member = w.agentId ? agents.get(w.agentId) : undefined;
      const working = !!member && (member.status === "working" || member.status === "starting" || member.status === "input");
      const canLand = w.readiness === "ahead" || w.readiness === "uncommitted";
      const proofState = (w.proof && w.proof.state) || "none";
      const gated = canLand && proofState !== "fresh";
      const note = w.readiness === "diverged" ? "diverged — resolve before landing"
        : w.readiness === "no-branch" ? "runs in place (no branch)"
        : gated ? `proof is ${proofState === "none" ? "missing" : proofState} — Verify first, or Force to land anyway`
        : working ? "agent still working — lands committed work only (its in-progress edits stay untouched)"
        : "merge this branch into main";
      return `<div class="landrow"><span class="branchmark">${esc(w.branch||"—")}</span>
        <span class="meta">↑${w.ahead} ↓${w.behind} · ${w.changedFiles} changed · <b class="rd-${w.readiness}">${w.readiness}</b>${working?` · <span style="color:var(--work)" title="this branch's agent is still running">⚙ working</span>`:""}</span>
        ${w.agentId?`<button class="sm landbtn" data-aid="${esc(w.agentId)}" ${canLand?"":"disabled"} title="${esc(note)}">⤳ Land</button>${gated?`<button class="sm forcebtn" data-aid="${esc(w.agentId)}" title="skip the proof gate and land this branch now">⚡ Force</button>`:""}`:""}</div>`;
    }).join("");
    for (const btn of lt.querySelectorAll(".landbtn")) btn.onclick = () => landFromFeature(btn.dataset.aid, btn);
    for (const btn of lt.querySelectorAll(".forcebtn")) btn.onclick = () => landFromFeature(btn.dataset.aid, btn, true);
  }
  const pt = $("#featproof");
  if (pt) {
    const ws = f.worktrees || [];
    if (!ws.length) pt.innerHTML = `<span style="color:var(--dim)">no worktrees — nothing to prove yet</span>`;
    else pt.innerHTML = (proofGated?`<div class="meta" style="color:var(--work);margin-bottom:6px">⚠ Landing is gated until every landable branch is fresh — Verify (or Force).</div>`:"")
      + ws.map(w => {
        const pr = w.proof || { state:"none", artifacts:0 };
        return `<div class="landrow"><span class="branchmark">${esc(w.branch||"—")}</span>`
          + `<span class="badge b-proof-${esc(pr.state)}" title="${esc(PROOF_TITLE[pr.state]||"")}">${esc(PROOF_LABEL[pr.state]||pr.state)}</span>`
          + `${pr.ranAt?` <span class="meta">${ago(pr.ranAt)} ago</span>`:""}`
          + `${pr.artifacts?` <span class="meta" title="screenshot artifacts collected as vision evidence">📷 ${pr.artifacts}</span>`:""}</div>`;
      }).join("");
  }
  const vb = $("#featVerify"); if (vb) vb.onclick = () => verifyFeature(f.id, vb);
  const flb = $("#featForceLand"); if (flb) flb.onclick = () => landAll(f.id, flb, true);
  const fa = $("#featagents");
  const mem = f.agentIds.map(id => agents.get(id)).filter(Boolean);
  if (!mem.length) fa.innerHTML = `<span style="color:var(--dim)">no live agents</span>`;
  else {
    fa.innerHTML = mem.map(a => `<div class="n" data-aid="${esc(a.id)}" style="cursor:pointer"><span class="badge b-${a.status}">${a.status}</span> ${esc(a.name)} <span style="color:var(--dim)">${esc(a.activity||"—")}</span>${f.persisted?` <button class="sm unlinkbtn" data-uid="${esc(a.id)}" title="Detach from feature">unlink</button>`:""}</div>`).join("");
    for (const el of fa.querySelectorAll("[data-aid]")) el.onclick = (e) => { if (e.target.classList.contains("unlinkbtn")) return; openAgent(el.dataset.aid); };
    for (const b of fa.querySelectorAll(".unlinkbtn")) b.onclick = (e) => { e.stopPropagation(); linkAgentUI(f.id, b.dataset.uid, true); };
  }
  if (f.persisted) {
    const box = $("#featassign");
    const unassigned = [...agents.values()].filter(a => a.repo === f.repo && !a.featureId);
    if (box) box.innerHTML = unassigned.length
      ? `<div class="spawnrow"><select id="assignSel">${unassigned.map(a=>`<option value="${esc(a.id)}">${esc(a.name)}</option>`).join("")}</select><button id="assignBtn" class="sm">+ Link agent</button></div>`
      : `<span style="color:var(--dim)">no unassigned agents in this repo</span>`;
    const ab = $("#assignBtn"); if (ab) ab.onclick = () => linkAgentUI(f.id, $("#assignSel").value, false);
  }
  const ad = $("#featAdopt"); if (ad) ad.onclick = () => adoptFeature(f);
  const fsi = $("#fspawnInput"), fsb = $("#fspawnBtn");
  if (fsi && fsb) {
    const go = () => { const t = fsi.value.trim(); if (t) { fsi.value = ""; spawnAgentOnFeature(f, t); } };
    fsb.onclick = go;
    fsi.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); go(); } };
  }
  if (f.planDir) loadPipeline(f);
  renderFeatureGate(f);
  loadFeatureTickets(f);
}

// Plane tickets for a feature: status group + deep link into the Plane web app, and a
// one-click "group these issues under a Plane module" (each feature → its own module).
const PLANE_BADGE = { completed:"idle", started:"working", cancelled:"stopped", backlog:"starting", unstarted:"starting", unknown:"stopped" };
async function loadFeatureTickets(f) {
  const box = $("#featplane"); if (!box) return;
  try {
    const r = await fetch(`/api/features/${encodeURIComponent(f.id)}/tickets`);
    const data = r.ok ? await r.json() : null;
    const tickets = data ? data.tickets : null;
    if (tickets === null) { box.innerHTML = `<span style="color:var(--dim)">Plane not connected.</span>`; return; }
    const moduleLink = data.moduleUrl
      ? `<a href="${esc(data.moduleUrl)}" target="_blank" rel="noopener" title="Open the feature's Plane module">▦ Module ↗</a>`
      : (f.persisted ? `<button id="featModuleBtn" class="sm" title="Create a Plane module for this feature and group its tickets under it">▦ Group in Plane</button>` : "");
    if (!tickets.length) {
      box.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:var(--dim)">No linked Plane tickets.</span>${moduleLink}</div>`;
    } else {
      box.innerHTML = `<div style="display:flex;justify-content:flex-end;margin-bottom:8px">${moduleLink}</div>`
        + `<div class="issuelist">${tickets.map(t => `<div class="issuerow"><span class="badge b-${PLANE_BADGE[t.status]||"starting"}" title="Plane status: ${esc(t.status)}">${esc(t.status)}</span><span class="iid">${esc(t.identifier)}</span><span class="inm">${esc(t.name)}</span><a href="${esc(t.url)}" target="_blank" rel="noopener" title="Open ${esc(t.identifier)} in Plane">↗</a></div>`).join("")}</div>`;
    }
    const mb = $("#featModuleBtn"); if (mb) mb.onclick = () => createFeatureModuleUI(f, mb);
  } catch { box.innerHTML = `<span style="color:var(--dim)">—</span>`; }
}
async function createFeatureModuleUI(f, btn) {
  btn.disabled = true; btn.textContent = "creating…";
  try {
    const r = await fetch(`/api/features/${encodeURIComponent(f.id)}/module`, { method:"POST", headers:{"content-type":"application/json"}, body:"{}" });
    if (!r.ok) { toast("module create failed: " + (await r.text()), "error"); btn.disabled = false; btn.textContent = "▦ Group in Plane"; return; }
    toast(`grouped “${f.title}” under a Plane module`, "info");
    loadFeatureTickets(f);
  } catch { toast("module create failed", "error"); btn.disabled = false; btn.textContent = "▦ Group in Plane"; }
}

// Attach a NEW agent to a feature: the server creates an auto-routed agent (intake picks
// the process) and links it to the feature in one call, then the board reflects it.
async function spawnAgentOnFeature(f, task) {
  try {
    const r = await fetch(`/api/features/${encodeURIComponent(f.id)}/agents`, { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ task, repo: f.repo }) });
    if (!r.ok) { toast("spawn failed: " + (await r.text()), "error"); return; }
    toast(`spawned an agent on ${f.title}`, "info");
    loadFeatures();
  } catch { toast("spawn failed", "error"); }
}

function renderFeatureGate(f) {
  const wrap = $("#featgatewrap"), box = $("#featgate");
  if (!wrap || !box) return;
  const mem = f.agentIds.map(id => agents.get(id)).filter(Boolean);
  const reqs = mem.flatMap(a => (a.pending || []).map(p => ({ aid: a.id, p })));
  if (!reqs.length) { wrap.style.display = "none"; box.innerHTML = ""; return; }
  wrap.style.display = "";
  box.innerHTML = reqs.map(r => preq(r.p)).join("");
  for (const { aid, p } of reqs) {
    const node = box.querySelector(`[data-req="${CSS.escape(p.id)}"]`); if (!node) continue;
    if (p.kind === "confirm") { node.querySelector(".yes").onclick = () => send({type:"answer",id:aid,requestId:p.id,value:"yes"}); node.querySelector(".no").onclick = () => send({type:"answer",id:aid,requestId:p.id,value:"no"}); }
    else if (p.kind === "select") node.querySelectorAll("button[data-opt]").forEach(b => b.onclick = () => send({type:"answer",id:aid,requestId:p.id,value:b.dataset.opt}));
    else { const i = node.querySelector("input"); node.querySelector(".submit").onclick = () => send({type:"answer",id:aid,requestId:p.id,value:i.value}); }
  }
}

// ── Styled in-app dialogs (OMPSQ-2): replace the native browser prompt/confirm calls ──
let genDlg;
function ensureGenDlg() { if (!genDlg) { genDlg = document.createElement("dialog"); document.body.appendChild(genDlg); } return genDlg; }
function confirmModal({ title, body = "", danger = false, okText = "Confirm" }) {
  const d = ensureGenDlg();
  return new Promise(resolve => {
    d.innerHTML = `<form method="dialog" class="modal"><h2>${esc(title)}</h2>${body?`<div class="sub">${esc(body)}</div>`:""}<div class="actions"><button id="gmCancel" type="button">Cancel</button><button value="ok" class="${danger?"danger":"primary"}" type="submit">${esc(okText)}</button></div></form>`;
    d.onclose = () => resolve(d.returnValue === "ok");
    d.querySelector("#gmCancel").onclick = () => d.close("cancel");
    d.showModal(); const ok = d.querySelector('button[value="ok"]'); if (ok) ok.focus();
  });
}
function promptModal({ title, label = "", placeholder = "", value = "" }) {
  const d = ensureGenDlg();
  return new Promise(resolve => {
    d.innerHTML = `<form method="dialog" class="modal"><h2>${esc(title)}</h2><div class="field">${label?`<label>${esc(label)}</label>`:""}<input id="gmInput" placeholder="${esc(placeholder)}" value="${esc(value)}" /></div><div class="actions"><button id="gmCancel" type="button">Cancel</button><button value="ok" class="primary" type="submit">OK</button></div></form>`;
    const input = d.querySelector("#gmInput");
    d.onclose = () => resolve(d.returnValue === "ok" ? input.value : null);
    d.querySelector("#gmCancel").onclick = () => d.close("cancel");
    d.showModal(); input.focus();
  });
}
async function newAutoFeature() {
  const goal = await promptModal({ title: "New auto feature", label: "Goal", placeholder: "research → plan → file to Plane → implement" });
  if (!goal || !goal.trim()) return;
  try {
    const r = await fetch("/api/features/auto", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ goal: goal.trim(), repo: spawnCwd }) });
    if (!r.ok) { toast("auto feature failed: " + (await r.text()), "error"); return; }
    const out = await r.json();
    await loadFeatures();
    if (out.feature && out.feature.id) openFeature(out.feature.id);
  } catch { toast("auto feature failed", "error"); }
}

async function landFromFeature(agentId, btn, force) {
  btn.disabled = true; btn.textContent = force ? "Forcing…" : "Landing…";
  try {
    const r = await fetch(`/api/agents/${encodeURIComponent(agentId)}/land`, { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify(force ? { force: true } : {}) });
    const res = await r.json();
    toast(res.ok ? `landed: ${res.detail||"merged"}` : `land failed: ${res.detail||r.status}`, res.ok ? "info" : "error");
  } catch { toast("land failed", "error"); }
  await loadFeatures();
}

// Run the feature's acceptance command in each member worktree (records a land proof per branch).
async function verifyFeature(id, btn) {
  btn.disabled = true; btn.textContent = "Verifying…";
  try {
    const r = await fetch(`/api/features/${encodeURIComponent(id)}/verify`, { method:"POST", headers:{"content-type":"application/json"}, body:"{}" });
    if (!r.ok) { toast("verify failed: " + (await r.text().catch(() => r.status)), "error"); }
    else { const res = await r.json(); toast(res.ok ? `proof green — ${res.results.length} branch(es) pass` : `proof red — ${res.results.filter(x => !x.ok).length}/${res.results.length} failing`, res.ok ? "info" : "warn"); }
  } catch { toast("verify failed", "error"); }
  await loadFeatures();
}

async function newFeature() {
  const title = await promptModal({ title: "New feature", label: "Title", placeholder: "feature title" });
  if (!title || !title.trim()) return;
  try { await fetch("/api/features", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ title: title.trim(), repo: spawnCwd }) }); }
  catch { toast("create failed", "error"); }
  await loadFeatures();
}
async function linkAgentUI(featureId, agentId, unlink) {
  if (!agentId) return;
  try { await fetch(`/api/features/${encodeURIComponent(featureId)}/agents`, { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ agentId, unlink: !!unlink }) }); }
  catch { toast("link failed", "error"); }
  await loadFeatures();
}
async function landAll(id, btn, force) {
  btn.disabled = true; btn.textContent = force ? "Forcing…" : "Landing…";
  try {
    const r = await fetch(`/api/features/${encodeURIComponent(id)}/land`, { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify(force ? { force: true } : {}) });
    const res = await r.json();
    toast(res.ok ? `landed ${res.results.length} branch(es)` : (res.stopped || "land stopped"), res.ok ? "info" : "error");
  } catch { toast("land failed", "error"); }
  await loadFeatures();
}

async function adoptFeature(f) {
  try {
    const r = await fetch("/api/features/from-plan", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ repo: f.repo, planDir: f.planDir, title: f.title }) });
    const pf = await r.json();
    await loadFeatures();
    if (pf && pf.id) openFeature(pf.id);
  } catch { toast("adopt failed", "error"); }
}
async function loadPipeline(f) {
  const box = $("#featpipe");
  if (!box) return;
  try {
    const r = await fetch(`/api/features/${encodeURIComponent(f.id)}/pipeline?repo=${encodeURIComponent(f.repo)}`);
    const p = await r.json();
    const concerns = p.concerns || [];
    if (!concerns.length) { box.innerHTML = `<span style="color:var(--dim)">no concern docs in ${esc(f.planDir||"")}</span>`; return; }
    const issueState = {};
    for (const i of (p.issues||[])) if (i.identifier) issueState[i.identifier] = i.state || "";
    box.innerHTML = concerns.map(c => `<div class="landrow">
      <span class="branchmark" style="color:${c.open?"var(--work)":"var(--ok)"}" title="concern status">${esc(c.status)}</span>
      <span class="meta"><b>${esc(c.title)}</b> · ${esc(c.file)}${c.priority?` · ${esc(c.priority)}`:""}${c.planeId?` · ${esc(c.planeId)}${(c.planeId in issueState)?` (${esc(issueState[c.planeId]||"?")})`:""}`:""}</span>
      ${f.persisted&&c.open?`<button class="sm implbtn" data-task="${esc(c.title)}" data-name="${esc(c.file.replace(/\.md$/,""))}">Implement</button>`:""}</div>`).join("");
    for (const b of box.querySelectorAll(".implbtn")) b.onclick = () => implementConcern(f, b.dataset.task, b.dataset.name, b);
  } catch { box.innerHTML = `<span style="color:var(--dim)">pipeline unavailable</span>`; }
}
async function implementConcern(f, task, name, btn) {
  btn.disabled = true; btn.textContent = "Spawning…";
  try {
    await fetch(`/api/features/${encodeURIComponent(f.id)}/agents`, { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ task: `Implement: ${task} (see ${f.planDir}). Work in this worktree and commit when done.`, repo: f.repo, name }) });
    toast("implement agent spawned", "info");
  } catch { toast("spawn failed", "error"); btn.disabled = false; btn.textContent = "Implement"; }
  await loadFeatures();
}

let homeMsg = "";
let homeDraft = "";
let spawning = false;

function setHomeStatus(msg) { homeMsg = msg; const el = $("#smartstatus"); if (el) el.textContent = msg; }

  hp.querySelectorAll("[data-pid]").forEach((el) => { el.style.cursor = "pointer"; el.onclick = () => { selProject = el.getAttribute("data-pid"); view = "project"; renderAll(); }; });

async function smartSpawn(prompt) {
  spawning = true;
  const go = $("#smartgo"); const input = $("#smartspawn");
  if (go) go.disabled = true;
  if (input) input.disabled = true;
  setHomeStatus("Thinking… picking a repo and naming the agent (a few seconds)…");
  try {
    const r = await fetch("/api/spawn", { method:"POST", headers:{ "content-type":"application/json" }, body: JSON.stringify({ prompt }) });
    if (!r.ok) { setHomeStatus("Couldn't spawn: " + (await r.text())); return; }
    const data = await r.json();
    const repoShort = String(data.plan.repo).split("/").filter(Boolean).pop();
    homeDraft = "";
    setHomeStatus(`Spawned “${data.agent.name}” on ${repoShort}${data.plan.reason ? " — " + data.plan.reason : ""}. Open it from Projects →`);
    toast(`Spawned ${data.agent.name} on ${repoShort}`, "info");
  } catch (e) {
    setHomeStatus("Spawn failed: " + (e && e.message ? e.message : e));
  } finally {
    spawning = false;
    const g = $("#smartgo"); const i = $("#smartspawn");
    if (g) g.disabled = false;
    if (i) { i.disabled = false; i.value = homeDraft; }
  }
}

function fillAgentGrid(p) {
  const grid = $("#agrid"); if (!grid) return;
  grid.innerHTML = "";
  if (!p.agents.length) { grid.innerHTML = `<span style="color:var(--dim)">No agents yet.</span>`; return; }
  const byStatus = (x,y)=>STATUSES.indexOf(x.status)-STATUSES.indexOf(y.status);
  const inProj = new Set(p.agents.map(a=>a.id));
  const roots = p.agents.filter(a=>!a.parentId || !inProj.has(a.parentId)).sort(byStatus);
  const ordered = [];
  for (const r of roots) { ordered.push([r,false]); for (const ch of p.agents.filter(a=>a.parentId===r.id).sort(byStatus)) ordered.push([ch,true]); }
  for (const [a,child] of ordered) {
    const card = document.createElement("div");
    card.className = "acard" + (a.status==="input"?" needs":"") + (child?" child":"");
    card.dataset.aid = a.id;
    if (a.id === navSel) card.style.outline = "2px solid var(--accent)";
    const kindBadge = a.kind==="workflow" ? `<span class="badge b-kind">⚙ workflow</span>` : a.kind==="flue-service" ? `<span class="badge b-kind">⚒ service</span>` : "";
    const stalled = isStalled(a, Date.now()); const pct = a.contextPct;
    card.innerHTML = `<div class="r1"><span class="badge b-${a.status}">${a.status}</span>${a.landReady?`<span class="badge b-ready">✓ ready to land</span>`:""}${a.status==="working"?`<span class="spin" style="color:var(--work)">${SPIN[spinFrame]}</span>`:""}${kindBadge}${child?`<span class="branchmark">↳ branch</span>`:""}<span class="nm">${esc(a.name)}</span>${stalled?`<span class="pill bad" title="working but no activity for a while">⏳ idle ${ago(a.lastActivity)}</span>`:""}</div>
      ${a.issue?`<div class="issue">${esc(a.issue.identifier||"")} ${esc(a.issue.name)}</div>`:""}
      <div class="meta">${esc(a.activity || a.todo?.active || "—")}</div>
      <div class="meta">${a.todo?`todo ${a.todo.done}/${a.todo.total} · `:""}${pct!=null?`<span style="color:${ctxColor(pct)}" title="context window usage${pct>0.9?" — near compaction":""}">ctx ${Math.round(pct*100)}%</span> · `:""}<span class="agotime" data-ts="${a.lastActivity}">${ago(a.lastActivity)} ago</span>${a.model?` · <span title="model" style="color:var(--dim)">${esc(a.model)}</span>`:""}${receiptSpan(a.receipt)}</div>`;
    clickable(card, () => openAgent(a.id), `${a.name} — ${a.status}`);
    grid.appendChild(card);
  }
}

// ── Command palette + keyboard nav (OMPSQ-6) ─────────────────────────────────
// Shared fuzzy matcher: also backs the composer slash menu (attachCompletion). Matches
// keyFn(item) by substring, ranks prefix hits first; tolerates an optional aliases[] array.
function fuzzyRank(items, query, keyFn) {
  const q = query.toLowerCase();
  const hit = c => keyFn(c).toLowerCase().includes(q) || (c.aliases || []).some(a => a.toLowerCase().includes(q));
  return items.filter(hit)
    .sort((a, b) => (keyFn(a).toLowerCase().startsWith(q) ? 0 : 1) - (keyFn(b).toLowerCase().startsWith(q) ? 0 : 1) || keyFn(a).localeCompare(keyFn(b)))
    .slice(0, 50);
}

// Live registry of destinations + actions, built from current state. Each item runs on accept.
function paletteItems() {
  const out = [
    { label: "Home", hint: "overview", run: () => { selProject = null; selAgent = null; view = "project"; renderAll(); } },
    { label: "Attention queue", hint: "blocked agents", run: openQueue },
    { label: "Feature board", hint: "", run: openBoard },
    { label: "Race board", hint: "per-agent pipeline", run: openRace },
    { label: "New agent", hint: "spawn", run: () => $("#addBtn").click() },
    { label: "Upgrade daemon", hint: "pull + restart", run: () => $("#upgradeBtn").click() },
  ];
  if (waitingAgents().length) out.splice(1, 0, { label: "Answer next blocked", hint: "queue", run: openQueue });
  for (const p of projects()) out.push({ label: `Project: ${p.name}`, hint: `${p.agents.length} agent(s)`, run: () => { selProject = p.id; selAgent = null; view = "project"; renderAll(); } });
  for (const a of agents.values()) out.push({ label: `Agent: ${a.name}`, hint: a.status, run: () => openAgent(a.id) });
  if (view === "agent" && selAgent) {
    out.push({ label: "Land this agent", hint: "merge", run: () => $("#landBtn")?.click() });
    out.push({ label: "Interrupt this agent", hint: "", run: () => $("#intBtn")?.click() });
    out.push({ label: "Restart this agent", hint: "", run: () => $("#rstBtn")?.click() });
    out.push({ label: "Kill this agent", hint: "danger", run: () => $("#killBtn")?.click() });
  }
  return out;
}

const palette = (() => {
  let el, input, list, items = [], sel = 0, prevFocus = null, open = false;
  const build = () => {
    el = document.createElement("div");
    el.className = "palette";
    el.innerHTML = `<div class="palbox">
      <input id="palInput" placeholder="Jump to a project, agent, or run a command…" autocomplete="off" />
      <div id="palList"></div></div>`;
    document.body.appendChild(el);
    input = el.querySelector("#palInput"); list = el.querySelector("#palList");
    input.addEventListener("input", refresh);
    input.addEventListener("keydown", onKey);
    el.addEventListener("mousedown", e => { if (e.target === el) close(); });
  };
  const refresh = () => {
    const q = input.value.trim(); const all = paletteItems();
    items = q ? fuzzyRank(all, q, i => i.label) : all.slice(0, 50);
    sel = 0; render();
  };
  const render = () => {
    list.innerHTML = items.length
      ? items.map((it, i) => `<div data-i="${i}" class="palrow${i===sel?' sel':''}"><span class="plabel">${esc(it.label)}</span>${it.hint?`<span class="phint">${esc(it.hint)}</span>`:''}</div>`).join("")
      : `<div class="palnone">No matches</div>`;
    for (const n of list.querySelectorAll("[data-i]")) n.onmousedown = (e) => { e.preventDefault(); run(items[+n.dataset.i]); };
  };
  const run = (it) => { if (!it) return; close(); it.run(); };
  const onKey = (e) => {
    if (!items.length) { if (e.key === "Escape") { close(); e.preventDefault(); } return; }
    if (e.key === "ArrowDown" || (e.ctrlKey && e.key === "n")) { sel = (sel + 1) % items.length; render(); e.preventDefault(); }
    else if (e.key === "ArrowUp" || (e.ctrlKey && e.key === "p")) { sel = (sel - 1 + items.length) % items.length; render(); e.preventDefault(); }
    else if (e.key === "Enter") { run(items[sel]); e.preventDefault(); }
    else if (e.key === "Escape") { close(); e.preventDefault(); }
  };
  const openIt = () => { if (!el) build(); prevFocus = document.activeElement; open = true; el.classList.add("open"); input.value = ""; refresh(); input.focus(); };
  const close = () => { if (!el) return; open = false; el.classList.remove("open"); if (prevFocus && prevFocus.focus) prevFocus.focus(); };
  return { toggle: () => open ? close() : openIt(), close, isOpen: () => open };
})();

// Move the keyboard highlight through the visible agent cards (DOM order).
function moveNav(delta) {
  const cards = [...document.querySelectorAll("#agrid .acard")];
  if (!cards.length) return;
  let idx = cards.findIndex(c => c.dataset.aid === navSel);
  idx = idx < 0 ? 0 : Math.min(cards.length - 1, Math.max(0, idx + delta));
  navSel = cards[idx].dataset.aid;
  for (const c of cards) c.style.outline = c.dataset.aid === navSel ? "2px solid var(--accent)" : "";
  cards[idx].scrollIntoView({ block: "nearest" });
}

document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && (e.key === "k" || e.key === "K")) { e.preventDefault(); palette.toggle(); return; }
  if (palette.isOpen()) return;
  const t = e.target;
  if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return;
  if (view === "project" && selProject) {
    if (e.key === "j" || e.key === "ArrowDown") { moveNav(1); e.preventDefault(); return; }
    if (e.key === "k" || e.key === "ArrowUp") { moveNav(-1); e.preventDefault(); return; }
    if ((e.key === "Enter" || e.key === "ArrowRight") && navSel) { openAgent(navSel); e.preventDefault(); return; }
  }
  if (e.key === "Escape" || e.key === "ArrowLeft") {
    if (view === "agent") { selAgent = null; view = "project"; renderAll(); e.preventDefault(); }
    else if (view === "queue" || view === "board" || view === "feature" || (view === "project" && selProject)) { selProject = null; selAgent = null; view = "project"; renderAll(); e.preventDefault(); }
  }
});
const cmdkBtn = $("#cmdkBtn"); if (cmdkBtn) cmdkBtn.onclick = () => palette.toggle();

// Live updates while viewing a project: refresh only the agent cards + side panels,
// never the spawn box (#pspawn) — rebuilding it would drop focus mid-typing.
function patchProjectView(p) {
  if (!$("#agrid")) { renderBody(); return; }
  fillAgentGrid(p);
  loadPresence(p.repo);
  loadLeases(p.repo);
}

function renderProject(body, p) {
  body.innerHTML = `
    <div class="pv">
      <div><h2>${esc(p.name)}</h2><div class="sub">${esc(p.repo)}</div></div>
      <div class="agrid" id="agrid"></div>
      <div class="section"><h3>Spawn an agent in this project</h3><div class="inner"><div class="spawnrow">
        <input id="pspawn" placeholder="Describe a task… (Enter to spawn an agent here)" autocomplete="off" />
      </div></div></div>
      <div class="section"><h3>Active on this repo</h3><div class="inner" id="presence"><span style="color:var(--dim)">…</span></div></div>
      <div class="section" id="fedSection" style="display:none"><h3>Federation <span style="color:var(--dim);font-weight:400">— peers on the tailnet</span></h3><div class="inner" id="federation"><span style="color:var(--dim)">…</span></div></div>
      <div class="section"><h3>Files in flight</h3><div class="inner tree" id="leases"><span style="color:var(--dim)">…</span></div></div>
      <div class="section"><h3>Plane issues</h3><div class="inner" id="issues"><span style="color:var(--dim)">Loading…</span></div></div>
    </div>`;
  fillAgentGrid(p);

  sp.onkeydown = (e) => { if (spComp.handleKey(e)) return; if (e.key==="Enter") { const t = sp.value.trim(); if (t) { send({ type:"create", options:{ repo:p.repo, task:t, approvalMode:"yolo" } }); sp.value=""; } } };
  loadIssues(p.repo);
  loadPresence(p.repo);

async function loadPresence(repo) {
  const box = $("#presence"); if (!box) return;
  try {
    const r = await fetch(`/api/presence?repo=${encodeURIComponent(repo)}`);
    if (!r.ok) throw 0;
    const live = await r.json();
    if (!live.length) { box.innerHTML = `<span style="color:var(--dim)">nobody claimed this repo.</span>`; return; }
    box.innerHTML = live.map(e => {
      const t = ago(e.heartbeat);
      const re = e.reattached ? ` <span title="reattached to a surviving host after a restart" style="color:var(--accent)">↻ reattached</span>` : "";
      return `<div class="subnode"><span class="badge b-${e.source==='squad'?'working':'idle'}">${esc(e.source)}</span> ${esc(e.operator)}/${esc(e.agent)} <span style="color:var(--dim)">${esc(e.branch||'')} · ${t} ago</span>${re}</div>`;
    }).join("");
  } catch { box.innerHTML = `<span style="color:var(--dim)">—</span>`; }
}

async function loadFederation() {
  const sec = $("#fedSection"); const box = $("#federation"); if (!sec || !box) return;
  const hide = () => { sec.style.display = "none"; };
  try {
    const r = await fetch("/api/federation");
    if (!r.ok) throw 0;
    const fed = await r.json();
    // Inert when no coordinator is configured, or nothing remote to show.
    const peers = (fed.operators || []).filter(o => o.operator && o.operator.origin === "remote");
    const collisions = fed.collisions || [];
    if (!fed.coordinator || (!peers.length && !collisions.length)) { hide(); return; }
    sec.style.display = "";
    const av = a => a === "active" ? "working" : a === "away" ? "input" : "idle";
    const base = p => String(p || "").split("/").filter(Boolean).pop() || p;
    const peerHTML = peers.length ? peers.map(o => {
      const who = esc(o.operator.displayName || o.operator.id) + (o.host ? `<span style="color:var(--dim)">@${esc(o.host)}</span>` : "");
      const ags = (o.agents || []).map(a => `<div class="subnode" style="margin-left:14px"><span class="badge b-${esc(a.status)}">${esc(a.status)}</span> ${esc(a.name)} <span style="color:var(--dim)">${esc(base(a.repo))}${a.branch ? " · " + esc(a.branch) : ""}</span></div>`).join("");
      return `<div class="subnode"><span class="badge b-${av(o.availability)}">${esc(o.availability)}</span> ${who} <span style="color:var(--dim)">· ${(o.agents||[]).length} agent${(o.agents||[]).length===1?"":"s"}</span></div>${ags}`;
    }).join("") : `<div class="subnode" style="color:var(--dim)">no peer operators online.</div>`;
    const colHTML = collisions.length ? `<div style="margin-top:8px"><div style="color:var(--dim);font-size:11px;margin-bottom:2px">SHARED BRANCHES</div>${collisions.map(c => `<div class="subnode" style="color:var(--work)">⚠ ${esc(base(c.repo))} <span style="color:var(--dim)">@ ${esc(c.ref)} — ${esc((c.operators||[]).join(", "))}</span></div>`).join("")}</div>` : "";
    box.innerHTML = peerHTML + colHTML;
  } catch { hide(); }
}

async function loadLeases(repo) {
  const box = $("#leases"); if (!box) return;
  try {
    const r = await fetch(`/api/leases?repo=${encodeURIComponent(repo)}`);
    if (!r.ok) throw 0;
    const leases = await r.json();
    if (!leases.length) { box.innerHTML = `<span style="color:var(--dim)">no files claimed.</span>`; return; }
    // Group by file; flag files held by >1 distinct holder as contended.
    const byFile = new Map();
    for (const l of leases) { const k = l.file; (byFile.get(k) || byFile.set(k, []).get(k)).push(l); }
    box.innerHTML = [...byFile.entries()].map(([file, hs]) => {
      const holders = [...new Set(hs.map(h => `${h.operator}/${h.session}`))];
      const conflict = holders.length > 1;
      const who = holders.join(", ");
      return `<div class="n ${conflict?'changed':''}">${conflict?'⚠ ':''}${esc(file)} <span style="color:var(--dim)">— ${esc(who)}</span></div>`;
    }).join("");
  } catch { box.innerHTML = `<span style="color:var(--dim)">—</span>`; }
}

async function loadIssues(repo) {
  const box = $("#issues"); if (!box) return;
  try {
    const r = await fetch(`/api/plane/issues?project=${encodeURIComponent(repo)}`);
    if (r.status === 501 || r.status === 404) { box.innerHTML = `<span style="color:var(--dim)">Plane not connected. Set PLANE_API_KEY + PLANE_WORKSPACE on the daemon to pull issues here.</span>`; return; }
    const issues = await r.json();
    if (!Array.isArray(issues) || !issues.length) { box.innerHTML = `<span style="color:var(--dim)">No open issues.</span>`; return; }
    box.innerHTML = `<div class="issuelist">${issues.map(i=>`<div class="issuerow"><span class="iid">${esc(i.identifier||"")}</span><span class="inm">${esc(i.name)}</span><button class="sm" data-id="${esc(i.id)}">Spawn</button></div>`).join("")}</div>`;
    for (const i of issues) {
      const btn = box.querySelector(`button[data-id="${CSS.escape(i.id)}"]`);
      if (btn) btn.onclick = () => send({ type:"create", options:{ repo, task:`Work on ${i.identifier||i.id}: ${i.name}`, issue:i, approvalMode:"yolo" } });
    }
  } catch { box.innerHTML = `<span style="color:var(--dim)">Plane not connected.</span>`; }
}

function openAgent(id) {
  selAgent = id; view = "agent";
  const a = agents.get(id); if (a) { const pr = projects().find(p => p.repo === a.repo); if (pr) selProject = pr.id; }
  if (!transcripts.has(id)) { transcripts.set(id, []); send({ type:"subscribe", id }); }
  renderAll();
}

function agentHeaderHTML(a) {

        <div class="sub"><span>${esc(a.model||"—")}</span><span>branch ${esc(a.branch||"—")}</span><span>${esc(a.worktree)}</span>${pct!=null?`<span style="color:${ctxColor(pct)}">ctx ${Math.round(pct*100)}%</span>`:""}<span class="agotime" data-ts="${a.lastActivity}">${ago(a.lastActivity)} ago</span>${a.receipt?`<span title="latest run: tool calls · cost · duration">🔧 ${a.receipt.toolCalls}${a.receipt.costUsd!=null?" · "+fmtCost(a.receipt.costUsd):""}${a.receipt.durationMs!=null?" · "+fmtDur(a.receipt.durationMs):""}</span>`:""}</div>`;

// Live agent/roster updates must NOT rebuild the agent view — that drops composer focus
// and yanks the transcript to the bottom mid-typing. Patch the header + pending in place;
// the transcript updates separately via appendTranscript, which preserves scroll.
function patchAgentView(a) {
  const h = $("#ahead");
  if (!h) { renderBody(); return; }
  h.innerHTML = agentHeaderHTML(a);

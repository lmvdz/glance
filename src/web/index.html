}

function refreshShell() {
  renderSidebar(); renderCrumb(); renderCounts();
  if (view === "queue" || view === "race") { renderBody(); return; }
  if (view === "board" || view === "feature") { renderBody(); scheduleFeatures(); return; }
  if (view === "agent" && selAgent && agents.has(selAgent)) { patchAgentView(agents.get(selAgent)); return; }
  if (view === "project" && selProject) { const p = projects().find(x => x.id === selProject); if (p) { patchProjectView(p); return; } }
  renderBody();
}

function renderAgent(body, a) {
  body.innerHTML = `
    <div class="av${showChanges ? " show-changes" : ""}">
      <div class="ahead">
        <div id="ahead">${agentHeaderHTML(a)}</div>
        <button id="changesToggle" class="toggle${showChanges ? " active" : ""}" title="Show this agent's changes next to the chat">⊟ Changes</button>
      </div>
      <div class="avmain">
        <div class="transcript" id="transcript"></div>
        <div class="aside">
          <div class="section"><h3>Subagents</h3><div class="inner tree" id="subs"><span style="color:var(--dim)">none</span></div></div>
          <div class="section"><h3>Changes</h3><div class="inner tree" id="diff"><span style="color:var(--dim)">—</span></div></div>
        </div>
        <div id="pendingWrap"></div>
        <div class="composer">
          <textarea id="composerInput" placeholder="Instruct this agent… (Enter to send)"></textarea>
          <div class="controls">
            <button class="primary" id="sendBtn">Send</button>
            <button id="intBtn">Interrupt</button><button id="rstBtn">Restart</button><button class="danger" id="killBtn">Kill</button><button class="primary" id="landBtn" title="Merge this agent's work into main — commits saved changes; while it is still working, only already-committed work is landed (in-progress edits preserved)">⤳ Land</button>
          </div>
        </div>
      </div>
    </div>`;
  const t = $("#transcript"); t.innerHTML = ""; const entries = transcripts.get(a.id) || []; for (const e of entries) appendTranscript(e);
  if (!entries.length) t.innerHTML = `<div class="te-empty" style="color:var(--dim);padding:8px 0">No messages yet${a.status === "stopped" ? " — this agent stopped before any turns" : "."}</div>`;
  renderPending(a);
  const inp = $("#composerInput");
  inp.value = composerDraft.get(a.id) || "";
  const comp = attachCompletion(inp, () => commandsByAgent.get(a.id) || []);
  inp.addEventListener("input", () => composerDraft.set(a.id, inp.value));
  $("#sendBtn").onclick = () => { const v = inp.value.trim(); if (v && send({ type:"prompt", id:a.id, message:v })) { composerDraft.delete(a.id); inp.value=""; } };
  inp.onkeydown = (e) => { if (comp.handleKey(e)) return; if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); $("#sendBtn").click(); } };
  $("#intBtn").onclick = () => send({ type:"interrupt", id:a.id });
  $("#rstBtn").onclick = () => send({ type:"restart", id:a.id });
  $("#killBtn").onclick = async () => { if (await confirmModal({ title: "Kill this agent?", body: "The agent process will be terminated.", danger: true, okText: "Kill" })) send({ type:"kill", id:a.id }); };
  $("#landBtn").onclick = async () => {
    const btn = $("#landBtn"); btn.disabled = true; btn.textContent = "Landing…";
    try {
      const r = await fetch(`/api/agents/${encodeURIComponent(a.id)}/land`, { method:"POST", headers:{"content-type":"application/json"}, body:"{}" });
      const res = await r.json();
      toast(res.ok ? `landed ${esc(a.name)}: ${res.detail||"merged"}` : `land failed: ${res.detail||r.status}`, res.ok ? "info" : "error");
      loadDiff(a.id);
    } catch { toast("land failed", "error"); }
    btn.disabled = false; btn.textContent = "⤳ Land";
  };
  $("#changesToggle").onclick = () => {
    showChanges = !showChanges;
    localStorage.setItem("squad.showChanges", showChanges ? "1" : "0");
    document.querySelector(".av")?.classList.toggle("show-changes", showChanges);
    $("#changesToggle").classList.toggle("active", showChanges);
    loadDiff(a.id); if (showChanges) loadSubs(a.id);
  };
  loadDiff(a.id); if (showChanges) loadSubs(a.id);
}

async function loadSubs(id) {
  const box = $("#subs"); if (!box) return;
  try { const r = await fetch(`/api/agents/${encodeURIComponent(id)}/subagents`); if (!r.ok) throw 0;
    const subs = await r.json();
    box.innerHTML = subs.length ? subs.map(s=>`<div class="subnode"><span class="badge b-${({running:"working"})[s.status]||"starting"}">${esc(s.status)}</span> ${esc(s.agent)} <span style="color:var(--dim)">${esc(s.description||s.task||"")}</span></div>`).join("") : `<span style="color:var(--dim)">none</span>`;
  } catch { box.innerHTML = `<span style="color:var(--dim)">none</span>`; }
}
// Surface how much of this agent's work is NOT yet in main: the count of changed
// files in its worktree. Highlights the Changes toggle so it's obvious a Land is
// needed before the work can be tested in the main checkout.
function setChangeCount(n) {
  const btn = $("#changesToggle"); if (!btn) return;
  btn.textContent = n > 0 ? `⊟ Changes · ${n}` : "⊟ Changes";
  btn.classList.toggle("attn", n > 0 && !showChanges);
  btn.title = n > 0
    ? `${n} file(s) changed in this agent's worktree — NOT in your main checkout yet. Open to review, then Land to merge into main and test.`
    : "Show this agent's changes next to the chat";
}
async function loadDiff(id) {
  const box = $("#diff");
  try {
    const r = await fetch(`/api/agents/${encodeURIComponent(id)}/diff`); if (!r.ok) throw 0;
    const diffs = await r.json();
    setChangeCount(diffs.length);
    if (!box) return;
    if (!diffs.length) { box.innerHTML = `<span style="color:var(--dim)">no changes</span>`; return; }
    box.innerHTML = diffs.map(d => {
      const lines = String(d.diff || "").split("\n").map(l => {
        const cls = (l[0] === "+" && !l.startsWith("+++")) ? "add" : (l[0] === "-" && !l.startsWith("---")) ? "del" : l.startsWith("@@") ? "hunk" : "";
        return `<span class="dl ${cls}">${esc(l) || " "}</span>`;
      }).join("\n");
      return `<details><summary class="n changed">${esc(d.status)} ${esc(d.file)}</summary><pre class="diffpre">${lines}</pre></details>`;
    }).join("");
  } catch { setChangeCount(0); if (box) box.innerHTML = `<span style="color:var(--dim)">—</span>`; }
}

function renderPending(a) {
  const wrap = $("#pendingWrap"); if (!wrap) return;
  if (!a.pending || !a.pending.length) { wrap.innerHTML = ""; return; }
  wrap.innerHTML = `<div class="pending"><h3>Needs your input</h3>${a.pending.map(preq).join("")}</div>`;
  for (const p of a.pending) { const node = wrap.querySelector(`[data-req="${CSS.escape(p.id)}"]`); if (node) wireReq(node, a.id, p); }
}
function preq(p) {
  let ctl = p.kind==="confirm" ? `<div class="ctl"><button class="yes primary">Yes</button><button class="no">No</button></div>`
    : p.kind==="select" ? `<div class="ctl">${(p.options||[]).map(o=>`<button data-opt="${esc(o)}">${esc(o)}</button>`).join("")}</div>`
    : `<div class="ctl"><input placeholder="${esc(p.placeholder||"answer")}" /><button class="submit primary">Submit</button></div>`;
  return `<div class="preq" data-req="${esc(p.id)}"><div><strong>${esc(p.title)}</strong>${p.message?" — "+esc(p.message):""}</div>${ctl}</div>`;
}

function mdEsc(s) { return String(s).replace(/[&<>]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[c])); }

// Allowlist URL schemes for rendered markdown — block javascript:/data: etc. that could run in the token-bearing origin. Relative + http(s)/mailto pass (quote-encoded for attribute safety).
function mdUrl(u) {
  const t = String(u).trim();
  if (/^[a-z][a-z0-9+.-]*:/i.test(t) && !/^(https?|mailto):/i.test(t)) return "#";
  return t.replace(/"/g, "%22");
}
function mdInline(s) {
  const codes = [];
  s = s.replace(/`([^`]+)`/g, (_, c) => { codes.push(c); return "\u0000" + (codes.length - 1) + "\u0000"; });
  s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, (_, a, u) => `<img class="md-img" src="${mdUrl(u)}" alt="${a.replace(/"/g, "&quot;")}" loading="lazy">`);
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, t, u) => `<a href="${mdUrl(u)}" target="_blank" rel="noopener noreferrer">${t}</a>`);
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>").replace(/__([^_]+)__/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*\w])\*([^*\n]+)\*/g, "$1<em>$2</em>").replace(/(^|[^_\w])_([^_\n]+)_/g, "$1<em>$2</em>");
  s = s.replace(/~~([^~]+)~~/g, "<del>$1</del>");
  s = s.replace(/\u0000(\d+)\u0000/g, (_, n) => `<code>${codes[+n]}</code>`);
  return s;
}

// Best-effort, dependency-free syntax highlighting: comments, strings, numbers, and a
// generic keyword set across common languages. Strings are matched before line comments,
// so a `//` inside a string isn't mistaken for a comment.
function highlightCode(code, lang) {
  const hash = /^(py|python|bash|sh|shell|zsh|ruby|rb|yaml|yml|toml|ini|makefile|dockerfile|r|perl|pl|nim|elixir|ex)$/i.test(lang || "");
  const kw = new Set(["function","fn","def","return","if","else","elif","for","while","do","switch","case","break","continue","const","let","var","new","class","struct","enum","interface","type","import","export","from","as","default","public","private","protected","static","async","await","yield","try","catch","finally","throw","raise","with","in","of","is","not","and","or","pub","impl","trait","mut","use","mod","match","where","func","package","val","when","extends","implements","super","this","self","void","null","nil","none","true","false","undefined","lambda","print","echo","local","then","fi","done","esac","require","module","go","defer","chan","map","string","int","bool","float","double","char","namespace"]);
  const re = /(\/\/[^\n]*|#[^\n]*)|(\/\*[\s\S]*?\*\/)|("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`)|(\b\d[\d_]*(?:\.\d+)?(?:[eE][+-]?\d+)?\b)|([A-Za-z_$][\w$]*)/g;
  let out = "", last = 0, m;
  while ((m = re.exec(code))) {
    out += mdEsc(code.slice(last, m.index));
    last = re.lastIndex;
    if (m[1]) out += (m[1][0] === "#" && !hash) ? mdEsc(m[1]) : `<span class="tok-c">${mdEsc(m[1])}</span>`;
    else if (m[2]) out += `<span class="tok-c">${mdEsc(m[2])}</span>`;
    else if (m[3]) out += `<span class="tok-s">${mdEsc(m[3])}</span>`;
    else if (m[4]) out += `<span class="tok-n">${mdEsc(m[4])}</span>`;
    else if (m[5]) out += kw.has(m[5]) ? `<span class="tok-k">${mdEsc(m[5])}</span>` : mdEsc(m[5]);
    else out += mdEsc(m[0]);
  }
  out += mdEsc(code.slice(last));
  return out;
}

function renderItemText(t) {
  const cb = t.match(/^\[([ xX])\]\s+(.*)$/);
  if (cb) return `<span class="md-task">${cb[1] === " " ? "☐" : "☑"}</span> ${mdInline(mdEsc(cb[2]))}`;
  return mdInline(mdEsc(t));
}

// Build nested <ul>/<ol> from flat {indent, ordered, text} items by indentation depth.
function buildList(items, pos) {
  const indent = items[pos].indent, ordered = items[pos].ordered;
  let html = ordered ? "<ol>" : "<ul>", i = pos;
  while (i < items.length && items[i].indent >= indent) {
    if (items[i].indent > indent) { i++; continue; }
    let inner = renderItemText(items[i].text);
    let j = i + 1;
    if (j < items.length && items[j].indent > indent) { const sub = buildList(items, j); inner += sub.html; j = sub.next; }
    html += `<li>${inner}</li>`;
    i = j;
  }
  html += ordered ? "</ol>" : "</ul>";
  return { html, next: i };
}

// Compact CommonMark-ish renderer: fenced + inline code, headings, lists, quotes, rules, emphasis, links.
function renderMarkdown(src) {
  const lines = String(src ?? "").split("\n");
  let html = "", i = 0;
  while (i < lines.length) {
    const line = lines[i];
    const fence = line.match(/^\s*(```+|~~~+)(.*)$/);
    if (fence) {
      const mark = fence[1][0].repeat(3); const lang = fence[2].trim().split(/\s+/)[0]; const buf = []; i++;
      while (i < lines.length && !lines[i].trimStart().startsWith(mark)) { buf.push(lines[i]); i++; }
      i++;
      html += `<pre><code>${highlightCode(buf.join("\n"), lang)}</code></pre>`;
      continue;
    }
    if (/^\s*(---+|\*\*\*+|___+)\s*$/.test(line)) { html += "<hr>"; i++; continue; }
    const h = line.match(/^\s*(#{1,6})\s+(.*)$/);
    if (h) { const l = h[1].length; html += `<h${l}>${mdInline(mdEsc(h[2]))}</h${l}>`; i++; continue; }
    if (/^\s*>\s?/.test(line)) {
      const buf = []; while (i < lines.length && /^\s*>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/, "")); i++; }
      html += `<blockquote>${renderMarkdown(buf.join("\n"))}</blockquote>`; continue;
    }
    if (/^\s*([-*+]|\d+[.)])\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*([-*+]|\d+[.)])\s+/.test(lines[i])) {
        const mm = lines[i].match(/^(\s*)([-*+]|\d+[.)])\s+(.*)$/);
        items.push({ indent: mm[1].replace(/\t/g, "  ").length, ordered: /\d/.test(mm[2]), text: mm[3] });
        i++;
      }
      html += buildList(items, 0).html;
      continue;
    }
    if (line.includes("|") && i + 1 < lines.length && /^[\s|:-]+$/.test(lines[i + 1]) && lines[i + 1].includes("-") && lines[i + 1].includes("|")) {
      const cells = (r) => r.replace(/^\s*\|/, "").replace(/\|\s*$/, "").split("|").map(c => c.trim());
      const headers = cells(line);
      const aligns = cells(lines[i + 1]).map(c => (c.startsWith(":") && c.endsWith(":")) ? "center" : c.endsWith(":") ? "right" : c.startsWith(":") ? "left" : "");
      i += 2;
      const rows = [];
      while (i < lines.length && lines[i].includes("|") && !/^\s*$/.test(lines[i])) { rows.push(cells(lines[i])); i++; }
      const cell = (c, a, tag) => `<${tag}${a ? ` style="text-align:${a}"` : ""}>${mdInline(mdEsc(c ?? ""))}</${tag}>`;
      html += `<table><thead><tr>${headers.map((c, j) => cell(c, aligns[j], "th")).join("")}</tr></thead><tbody>${rows.map(r => `<tr>${headers.map((_, j) => cell(r[j], aligns[j], "td")).join("")}</tr>`).join("")}</tbody></table>`;
      continue;
    }
    if (/^\s*$/.test(line)) { i++; continue; }
    const buf = [line]; i++;
    while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^\s*(```+|~~~+|#{1,6}\s|>\s?)/.test(lines[i]) && !/^\s*([-*+]|\d+[.)])\s+/.test(lines[i]) && !/^\s*(---+|\*\*\*+|___+)\s*$/.test(lines[i]) && !(lines[i].includes("|") && i + 1 < lines.length && /^[\s|:-]+$/.test(lines[i + 1]) && lines[i + 1].includes("-") && lines[i + 1].includes("|"))) { buf.push(lines[i]); i++; }
    html += `<p>${mdInline(mdEsc(buf.join("\n")))}</p>`;
  }
  return html;
}

function appendTranscript(e) {
  const t = $("#transcript"); if (!t) return; const ph = t.querySelector(".te-empty"); if (ph) ph.remove();
  const div = document.createElement("div"); div.className = "te " + e.kind;
  const rich = e.kind === "assistant" || e.kind === "user" || e.kind === "thinking" || e.kind === "system";
  const body = rich ? `<div class="md">${renderMarkdown(e.text)}</div>` : `<span class="body">${esc(e.text)}</span>`;
  div.innerHTML = `<span class="who">${e.kind}</span>${body}`;
  const atBottom = t.scrollHeight - t.scrollTop - t.clientHeight < 60; t.appendChild(div); if (atBottom) t.scrollTop = t.scrollHeight;
}

function announce(m) { const el = $("#srlive"); if (el) el.textContent = String(m || ""); }
function toast(text, level) { const el = document.createElement("div"); el.className = "toast " + (level||"info"); el.textContent = text; $("#log").appendChild(el); announce(text); setTimeout(()=>el.remove(), 5000); }

// add modal
const dlg = $("#addDlg");
$("#addBtn").onclick = () => { const repo = $("#addForm").repo; if (selProject) repo.value = selProject; dlg.showModal(); };
$("#addCancel").onclick = () => dlg.close();
$("#addForm").onsubmit = (e) => {
  const f = new FormData(e.target); const options = { repo: f.get("repo").trim() };
  for (const k of ["name","task"]) { const v=(f.get(k)||"").trim(); if (v) options[k]=v; }
  options.approvalMode = f.get("approvalMode"); options.thinking = f.get("thinking");
  send({ type:"create", options }); e.target.reset();
};

fetch("/api/info").then(r=>r.json()).then(i=>{ spawnCwd = i.cwd || "."; }).catch(()=>{});

// Upgrade: pull latest + re-exec the daemon (agents survive via detached hosts).
async function refreshUpgrade() {
  try {
    const g = await (await fetch("/api/upgrade/status")).json();
    const btn = document.querySelector("#upgradeBtn");
    btn.textContent = g.behind > 0 ? `⤴ Upgrade (${g.behind})` : "⤴ Upgrade";
    btn.title = g.behind > 0 ? `${g.behind} commit(s) behind ${g.upstream||"upstream"} — pull + restart` : "Restart the daemon to load new code (agents survive)";
  } catch {}
}
document.querySelector("#upgradeBtn").onclick = async () => {
  if (!(await confirmModal({ title: "Upgrade daemon?", body: "Pull latest + restart. Agents keep running; the dashboard will reconnect." }))) return;
  toast("upgrading — pulling + restarting…", "info");
  try {
    const res = await (await fetch("/api/upgrade", { method:"POST", headers:{"content-type":"application/json"}, body:"{}" })).json();
    toast(res.pull?.detail ? `pull: ${res.pull.detail}` : "restarting…", res.pull?.ok===false ? "warn" : "info");
  } catch { toast("restarting…", "info"); }
};
function urlB64ToUint8Array(b64) {
  const pad = "=".repeat((4 - (b64.length % 4)) % 4);
  const base = (b64 + pad).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base); const out = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
  return out;
}
// Subscribe this device for background push (best-effort: needs notification permission + a secure context).
async function subscribePush() {
  try {
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) return;
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
    const r = await fetch("/api/push/key"); if (!r.ok) return;
    const { publicKey } = await r.json(); if (!publicKey) return;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToUint8Array(publicKey) });
    await fetch("/api/push/subscribe", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(sub) });
  } catch {}
}
function boot() {
  refreshUpgrade(); setInterval(refreshUpgrade, 30000);
  const mainEl = document.querySelector("main");
  if (localStorage.getItem("squad.navCollapsed") === "1") mainEl.classList.add("nav-collapsed");
  $("#navToggle").onclick = () => {
    if (isMobile()) { mainEl.classList.toggle("nav-open"); return; }
    const c = mainEl.classList.toggle("nav-collapsed"); localStorage.setItem("squad.navCollapsed", c ? "1" : "0");
  };
  document.querySelector(".content").addEventListener("click", () => mainEl.classList.remove("nav-open"));
  const muteBtn = $("#muteBtn");
  const syncMute = () => { if (muteBtn) muteBtn.textContent = muted ? "🔕" : "🔔"; };
  const reqNotifyPerm = () => { try { if (typeof Notification !== "undefined" && Notification.permission === "default") Notification.requestPermission().then((p) => { if (p === "granted") subscribePush(); }); } catch {} };
  syncMute();
  if (muteBtn) muteBtn.onclick = () => { muted = !muted; localStorage.setItem("squad.mute", muted ? "1" : "0"); syncMute(); reqNotifyPerm(); };
  window.addEventListener("pointerdown", reqNotifyPerm, { once: true });
  window.addEventListener("focus", () => updateBadge(waitingAgents().length));
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").then(() => { if (typeof Notification !== "undefined" && Notification.permission === "granted") subscribePush(); }).catch(() => {});
  firstPaint("Connecting to the daemon…");
  connect();
}
// ── theme toggle ─────────────────────────────────────────────────────────────
// Flips html[data-theme] and persists to localStorage. The pre-paint script in
// <head> already applied the stored/system theme; this only handles user clicks.
(function setupTheme(){
  const btn = document.getElementById("themeBtn"); if (!btn) return;
  const meta = document.querySelector('meta[name="theme-color"]');
  const sysLight = () => matchMedia("(prefers-color-scheme: light)").matches;
  const effective = () => document.documentElement.dataset.theme || (sysLight() ? "light" : "dark");
  const sync = () => {
    const t = effective();
    btn.textContent = t === "light" ? "☀" : "☾";
    btn.setAttribute("aria-label", t === "light" ? "Switch to dark theme" : "Switch to light theme");
    btn.setAttribute("aria-pressed", String(t === "dark"));
    if (meta) meta.content = t === "light" ? "#f6f7f9" : "#0c0e12";
  };
  sync();
  btn.onclick = () => {
    const next = effective() === "light" ? "dark" : "light";
    document.documentElement.dataset.theme = next;
    localStorage.setItem("squad.theme", next);
    sync();
  };
})();

if (TOKEN()) boot(); else showLogin();
